      ${lastEx ? `<div class="ex-ref"><span class="ex-ref-tag">Anterior</span>${lastEx.sets.map(s=>`${ex.bodyweight ? (s.weight>0?'+'+s.weight+'kg':'PC') : s.weight+'kg'}×${s.reps}`).join('  ·  ')}</div>` : ''}
      ${prog ? `<div class="ex-suggestion ${prog.status}"><span class="ex-sug-icon">${PROG_ICON[prog.status]||''}</span><span class="ex-sug-text">${prog.label}</span></div>` : ''}
      ${(ex.plates && suggestedWeight > 0 && platesPerSide(suggestedWeight)) ? `<div class="ex-plates"><span class="ex-warmup-tag">Discos</span> <span class="ex-warmup-text">${suggestedWeight}kg = barra + ${platesPerSide(suggestedWeight)}</span></div>` : ''}
      ${warmup ? `<div class="ex-warmup"><span class="ex-warmup-tag">Aquecer</span> <span class="ex-warmup-text">${warmup.text}</span> <span class="ex-warmup-note">· descanso curto</span></div>` : ''}
      ${ex.bodyweight ? `<div class="ex-ref" style="margin-top:4px">Lastro 0 = só peso corporal. Adiciona lastro quando fizeres 3×${ex.repsMax} com RIR 2+.</div>` : ''}
    </div><div class="sets-area">
    <div class="sets-head ${ex.repsOnly?'reps-only':''}"><span class="sets-head-num"></span><span class="sets-head-lbl">${ex.bodyweight?'Lastro (kg)':'Carga (kg)'}</span>${ex.repsOnly?'':'<span class="sets-head-lbl">Reps</span>'}${ex.repsOnly?'<span class="sets-head-lbl">Reps</span>':''}</div>`;

    for (let i = 1; i <= ex.sets; i++) {

      const isLast = (i === ex.sets) ? 1 : 0;
      // pre-fill weight with the suggested load (editable); fallback to last session's weight
      const preWeight = (suggestedWeight != null && suggestedWeight > 0) ? suggestedWeight
                        : (ls && ls.weight > 0 ? ls.weight : (ex.bodyweight ? 0 : ''));
      if (ex.repsOnly) {
        // Exercício só de reps (ex: Hanging Leg Raise) — sem campo de peso
        html += `<div class="set-row reps-only" id="row_${ex.id}_${i}" data-ex="${ex.id}" data-set="${i}" data-last="${isLast}">
          <div class="set-num">${i}</div>
          <div class="set-input-wrap">
            <input class="set-input" type="number" inputmode="numeric" id="r_${ex.id}_${i}" oninput="onSetInput('${ex.id}',${i})" placeholder="${ls?ls.reps:'—'}">
          </div>
        </div>`;
      } else {
        html += `<div class="set-row" id="row_${ex.id}_${i}" data-ex="${ex.id}" data-set="${i}" data-last="${isLast}">
          <div class="set-num">${i}</div>
          <div class="set-input-wrap">
            <input class="set-input w-input" type="number" inputmode="decimal" id="w_${ex.id}_${i}" oninput="onSetInput('${ex.id}',${i})" value="${preWeight}">
          </div>
          <div class="set-input-wrap">
            <input class="set-input" type="number" inputmode="numeric" id="r_${ex.id}_${i}" oninput="onSetInput('${ex.id}',${i})" placeholder="${ls?ls.reps:'—'}">
          </div>
        </div>`;
      }
    }
    html += `</div>`;
    html += `</div>`;
  });
  if (w.coreRef && w.coreRef.length) {
    html += `<div class="ex-card" style="background:var(--surface2)"><div class="ex-header">
      <div class="ex-name" style="font-size:15px">Core para corrida</div>
      <div class="ex-meta">No fim — prevenção para corrida</div>
    </div><div style="padding:4px 16px 14px">`;
    w.coreRef.forEach((item,i) => {
      html += `<div style="font-size:14px;color:var(--text);padding:7px 0;${i<w.coreRef.length-1?'border-bottom:1px solid var(--border)':''}">${item}</div>`;
    });
    html += `</div></div>`;
  }

  if (w.finisher) {
    html += `<div class="ex-card" style="background:var(--surface2)"><div class="ex-header">
      <div class="ex-name" style="font-size:15px">Finisher · cardio</div>
      <div class="ex-meta">Opcional — no fim do treino</div>
    </div><div style="padding:4px 16px 14px">
      <div style="font-size:14px;color:var(--text);padding:7px 0">${w.finisher}</div>
    </div></div>`;
  }

  html += `<button class="save-btn" onclick="saveSession()">${SVG.save} Guardar Sessão</button>`;
  html += `<button class="discard-btn" onclick="discardWorkout()">Descartar treino</button>`;
  container.innerHTML = html;
  loadDraft();
}

async function discardWorkout() {
  if (!await confirmModal({title:'Descartar treino?', message:'Os dados que registaste não serão guardados.', confirmLabel:'Descartar', danger:true})) return;
  // clear rest/timeout, draft, timer state
  if (_autoRestTimeout) { clearTimeout(_autoRestTimeout); _autoRestTimeout = null; }
  _autoRestFired = {};
  clearDraft();
  resetTimer();
  clearTimerState();
  stopBigTimer();
  hideMiniTimer();
  currentWorkout = null;
  releaseWakeLock();
  renderHome();
  showToast('Treino descartado');
}

async function saveSession() {
  const w = WORKOUTS[currentWorkout];
  let anyFilled = false;
  const exData = w.exercises.map(ex => {
    const sets = [];
    for (let i = 1; i <= ex.sets; i++) {
      let weight = parseFloat(document.getElementById(`w_${ex.id}_${i}`)?.value);
      let reps = parseInt(document.getElementById(`r_${ex.id}_${i}`)?.value, 10);
      // sanitize: discard NaN / negatives / implausible values so lixo never enters the data
      weight = (!isFinite(weight) || weight < 0) ? 0 : Math.min(weight, 1000);
      reps = (!isFinite(reps) || reps < 0) ? 0 : Math.min(reps, 500);
      // a set only counts if it has reps actually performed; otherwise store as empty
      // (weight is pre-filled with the suggestion, so reps is the real "did it" signal)
      if (reps > 0) { anyFilled = true; sets.push({weight, reps}); }
      else { sets.push({weight: 0, reps: 0}); }
    }
    return {id:ex.id, name:ex.name, sets};
  });

  if (!anyFilled) { showToast('Preenche pelo menos uma série!'); return; }

  const session = {id:Date.now(), workoutKey:currentWorkout, date:new Date().toISOString(), exercises:exData, duration:getTimerSeconds()};

  // SAFETY NET: store the session locally BEFORE anything else, so it can never be lost
  addPending(session);

  showToast('A guardar...');
  const ok = await sb.saveSession(session);

  if (ok) {
    // saved to cloud — remove from pending and refresh
    removePending(session.id);
    _sessions = await sb.getSessions();
    resetTimer();
    clearDraft();
    clearTimerState();
    showProgressionSummary(exData, w);
  } else {
    // cloud save failed — keep it local, don't lose anything
    resetTimer();
    clearDraft();
    clearTimerState();
    // add to in-memory list so it shows immediately
    _sessions = [...(_sessions||[]), session].sort((a,b)=>new Date(a.date)-new Date(b.date));
    showToast('Guardado no telemóvel (sincroniza depois)');
    showProgressionSummary(exData, w);
  }
}

// ===== Pending (local) sessions — safety net against lost data =====
function getPending() {
  try { return JSON.parse(localStorage.getItem('vt_pending') || '[]'); } catch(e) { return []; }
}
function addPending(session) {
  try {
    const p = getPending();
    if (!p.find(s => s.id === session.id)) { p.push(session); localStorage.setItem('vt_pending', JSON.stringify(p)); }
  } catch(e) {}
}
function removePending(id) {
  try {
    const p = getPending().filter(s => s.id !== id);
    localStorage.setItem('vt_pending', JSON.stringify(p));
  } catch(e) {}
}
// Try to upload any pending sessions (called on app start and after login)
async function syncPending() {
  const p = getPending();
  if (!p.length) return;
  let synced = 0;
  for (const session of p) {
    const ok = await sb.saveSession(session);
    if (ok) { removePending(session.id); synced++; }
  }
  if (synced > 0) { showToast(`${synced} treino(s) sincronizado(s) ✓`); _sessions = await sb.getSessions(); }
}

// Conta treinos de musculação na semana atual (Seg-Dom) e devolve {done, frase}
function weekProgressMessage(sessions) {
  // Chaves de treino e total/semana derivados do plano ATIVO (não hardcoded).
  const LIFT_KEYS = DAYS.filter(d => d.key).map(d => d.key);
  const uniqueKeys = [...new Set(LIFT_KEYS)];
  const total = uniqueKeys.length; // nº de treinos de musculação por semana neste plano
  const now = new Date();
  const day = now.getDay(); // 0=Dom
  const diffToMon = (day === 0 ? 6 : day - 1);
  const monday = new Date(now);
  monday.setDate(now.getDate() - diffToMon);
  monday.setHours(0,0,0,0);

  const done = sessions.filter(s => {
    if (!uniqueKeys.includes(s.workoutKey)) return false;
    return new Date(s.date) >= monday;
  }).length;

  if (done < 1 || total < 1) return null;

  const restantes = Math.max(0, total - done);
  const complete = done >= total;
  let frase;
  if (complete) {
    const fechadas = [
      "Semana completa. Foi tudo.",
      "Semana fechada como deve ser.",
      "Está feito. Semana cheia.",
    ];
    frase = fechadas[Math.floor(Math.random()*fechadas.length)];
  } else if (restantes === 1) {
    const quase = [
      "Quase lá. Falta um treino para a semana completa.",
      "Só falta fechar.",
      "Mais um e a semana fica redonda.",
    ];
    frase = quase[Math.floor(Math.random()*quase.length)];
  } else {
    const meio = [
      `Bom ritmo. Faltam ${restantes} para fechar a semana.`,
      `${done} na conta. A semana está a ganhar forma.`,
      `Continua a empurrar — faltam ${restantes}.`,
    ];
    frase = meio[Math.floor(Math.random()*meio.length)];
  }
  return { done, total, frase, complete };
}

async function saveEditedSession(id) {
  const s = getSessions().find(x => x.id === id);
  if (!s) return;
  // read edited values back into the exercises structure
  const newExercises = s.exercises.map((ex, exIdx) => {
    const newSets = ex.sets.map((st, setIdx) => {
      const wEl = document.getElementById(`ew_${exIdx}_${setIdx}`);
      const rEl = document.getElementById(`er_${exIdx}_${setIdx}`);
      if (!wEl || !rEl) return st; // set wasn't shown (was empty) — keep as is
      let weight = parseFloat(wEl.value);
      let reps = parseInt(rEl.value, 10);
      weight = (!isFinite(weight) || weight < 0) ? 0 : Math.min(weight, 1000);
      reps = (!isFinite(reps) || reps < 0) ? 0 : Math.min(reps, 500);
      return { weight, reps };
    });
    return { ...ex, sets: newSets };
  });
  const updated = { ...s, exercises: newExercises };
  showToast('A guardar...');
  const ok = await sb.updateSession(updated);
  if (ok) {
    _sessions = await sb.getSessions();
    renderHistorico();
    showToast('Sessão atualizada ✓');
  } else {
    showToast('Erro ao guardar. Tenta de novo.');
  }
}

function calcWeekComparison(sessions) {
  const now = new Date();
  const dayMs = 24*60*60*1000;
  const thisWeekStart = new Date(now - 7*dayMs);
  const lastWeekStart = new Date(now - 14*dayMs);
  let thisVol=0, lastVol=0, thisCount=0, lastCount=0;
  sessions.forEach(s => {
    const d = new Date(s.date);
    const v = calcVolume(s);
    if (d >= thisWeekStart) { thisVol+=v; thisCount++; }
    else if (d >= lastWeekStart) { lastVol+=v; lastCount++; }
  });
  return { thisVol, lastVol, thisCount, lastCount };
}

// Gráfico de barras em SVG (limpo, escalável)

// Gráfico de LINHA para evolução no tempo (1RM, reps). Escala ajustada para a tendência ser visível.
function svgLine(data) {
  if (!data.length) return '';
  if (data.length === 1) { // um só ponto: mostra-o centrado
    data = [data[0], data[0]];
  }
  const W = 320, H = 150, padL = 8, padR = 8, padB = 22, padT = 26;
  const n = data.length;
  const vals = data.map(d=>d.value);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if (lo === hi) { lo -= 1; hi += 1; } // evitar divisão por zero
  // margem de 15% para a linha não colar ao topo/fundo
  const range = hi - lo;
  lo -= range * 0.18; hi += range * 0.18;
  const plotW = W - padL - padR, plotH = H - padB - padT;
  const x = i => padL + (n===1?plotW/2:(i/(n-1))*plotW);
  const y = v => padT + plotH - ((v-lo)/(hi-lo))*plotH;

  let pts = data.map((d,i)=>`${x(i).toFixed(1)},${y(d.value).toFixed(1)}`).join(' ');
  // área sob a linha (gradiente subtil)
  let area = `${padL},${(padT+plotH).toFixed(1)} ${pts} ${(padL+plotW).toFixed(1)},${(padT+plotH).toFixed(1)}`;
  let dots = '', labels = '', topvals = '';
  data.forEach((d,i) => {
    const cx = x(i), cy = y(d.value);
    const isLast = i === n-1;
    dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${isLast?5:3.5}" fill="${isLast?'#39FF88':'#2ecc71'}" stroke="#0a0e0c" stroke-width="2"/>`;
    topvals += `<text x="${cx.toFixed(1)}" y="${(cy-10).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="${isLast?'#39FF88':'#9fb3a8'}">${d.top}</text>`;
    if (d.label) labels += `<text x="${cx.toFixed(1)}" y="${H-6}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8.5" fill="#6a7d72">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px;display:block">
    <defs><linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39FF88" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#39FF88" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#lineGrad)"/>
    <polyline points="${pts}" fill="none" stroke="#39FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${topvals}${labels}
  </svg>`;
}

  const streak = calcStreak(sessions);
  const fmtNum = (v)=> v>=1000 ? Math.round(v/1000*10)/10+'k' : Math.round(v);

  let html = `<div class="stats-grid">

  </div>`;

  // Comparação semana vs anterior — só quando faz sentido
  const cmp = calcWeekComparison(sessions);
  if (cmp.lastCount > 0) {
    const volDiff = cmp.thisVol - cmp.lastVol;
    const volPct = cmp.lastVol > 0 ? Math.round((volDiff/cmp.lastVol)*100) : null;
    const volUp = volDiff >= 0;
    const fmtKg = (v)=> v>=1000 ? Math.round(v/1000*10)/10+'k' : Math.round(v)+'';

        <div class="cmp-prev">anterior: ${cmp.lastCount}</div>
      </div>
    </div>`;
  }

  // Gráficos de volume e frequência (linha — evolução no tempo)
  const weekly = calcWeeklyVolume(sessions);
  if (weekly.length >= 2) {
    const volData = weekly.slice(-8).map(wk => ({ value: wk.vol, top: wk.vol>=1000?`${Math.round(wk.vol/1000*10)/10}k`:`${Math.round(wk.vol)}`, label: wk.label }));
    html += `<p class="section-title">Volume Semanal (kg)</p><div class="chart-wrap">${svgLine(volData)}</div>`;

    const freqData = weekly.slice(-8).map(wk => ({ value: wk.count, top: `${wk.count}`, label: wk.label }));

  sessions.forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    s.exercises.forEach(se => {
      const def = w.exercises.find(e=>e.id===se.id); if(!def) return;
      const bw = !!def.bodyweight;
      se.sets.forEach(st => {
        const counts = bw ? (st.reps>0) : (st.weight>0&&st.reps>0);
        if(counts) def.muscles.forEach(m=>{
          muscleSets[m]=(muscleSets[m]||0)+1;
        });
      });
    });
  });

  // nº de semanas distintas com treino
  const weekSet = new Set(sessions.map(s => {
    const d = new Date(s.date);
    const soy = new Date(d.getFullYear(), 0, 1);
    return d.getFullYear()+'-'+Math.floor((d - soy)/(7*24*60*60*1000));
  }));
  const numWeeks = Math.max(weekSet.size, 1);

  // séries/semana por músculo
  const setsWk = {};
  Object.keys(MUSCLES).forEach(m => { setsWk[m] = (muscleSets[m]||0)/numWeeks; });
  const maxSW = Math.max(...Object.values(setsWk), 1);

  // ----- Mapa muscular (boneco) -----
  let html = `<p class="section-title">Mapa Muscular</p>
    <div class="stat-card" style="margin-bottom:16px">
      <div class="nutri-card-intro" style="margin-bottom:14px">Intensidade de treino por grupo (séries/semana). Quanto mais verde, mais volume. Ajuda a ver o que andas a negligenciar.</div>
      ${muscleMapSVG(setsWk, maxSW)}
      <div class="cgrid-foot" style="justify-content:center;gap:8px;margin-top:14px"><span class="cgrid-legend"><span style="font-size:10px">menos</span><span class="mm-legend-grad"></span><span style="font-size:10px">mais</span></span></div>
    </div>`;

  // ----- Séries por músculo por semana (lista, rigorosa) -----
  const SCALE = 24; // escala fixa: 0 a 24 séries (zona ideal 10-20 fica visível)
  html += `<p class="section-title">Séries por Músculo / Semana</p>
    <div class="stat-card" style="margin-bottom:24px"><div class="nutri-card-intro" style="margin-bottom:14px">Para hipertrofia, a zona habitual é 10–20 séries por semana por grupo.</div>`;
  Object.entries(MUSCLES)
    .map(([key,label])=>({key,label,sw:setsWk[key]||0}))
    .sort((a,b)=>b.sw-a.sw)
    .forEach(({label,sw}) => {
      const v = Math.round(sw); // inteiro
      let zone = 'low';
      if (sw >= 10 && sw <= 20) zone = 'good';
      else if (sw > 20) zone = 'high';
      const pct = Math.min(100, Math.round((sw/SCALE)*100));
      html += `<div class="muscle-row">
        <div class="muscle-name">${label}</div>
        <div class="muscle-bar-bg">
          <div class="muscle-ideal-zone" style="left:${(10/SCALE)*100}%;width:${((20-10)/SCALE)*100}%"></div>
          <div class="muscle-bar-fill zone-${zone}" style="width:${pct}%"></div>
        </div>
        <div class="muscle-vol">${v}</div>
      </div>`;
    });
  html += `<div class="sets-legend"><span class="sl-dot good"></span>10–20 ideal &nbsp; <span class="sl-dot low"></span>abaixo &nbsp; <span class="sl-dot high"></span>acima</div>`;
  html += `</div>`;
  return html;
}

// Cor verde graduada por intensidade (0 a 1)
function muscleHeat(val, max) {
  const t = Math.max(0, Math.min(1, val / max));
  if (t < 0.02) return '#1c2420'; // praticamente nada
  // interpola de cinza-esverdeado escuro até verde neon
  // base: #2a342e → accent: #39FF88
  const lerp = (a,b)=>Math.round(a+(b-a)*t);
  const r = lerp(42, 57);
  const g = lerp(52, 255);
  const b = lerp(46, 136);
  return `rgb(${r},${g},${b})`;
}

// 1RM estimado pela fórmula de Epley: peso × (1 + reps/30)
function estimate1RM(weight, reps) {
  if (weight <= 0 || reps <= 0) return 0;
  if (reps === 1) return weight;
  return weight * (1 + reps / 30);
}

// Devolve a definição do exercício (procura em todos os treinos) pelo id
function exDef(exId) {
  for (const wk of Object.keys(WORKOUTS)) {
    const ex = WORKOUTS[wk].exercises.find(e=>e.id===exId);
    if (ex) return ex;
  }
  return null;
}
function isBodyweight(exId) { const d = exDef(exId); return !!(d && d.bodyweight); }

function updateChart() {
  const exId = document.getElementById('ex-select')?.value; if(!exId) return;
  const bw = isBodyweight(exId);
  const points = [];      // para o gráfico
  let bestReal = null;    // recorde real (peso × reps)
  let best1rm = 0;        // melhor 1RM estimado
  getSessions().forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    const se = s.exercises.find(e=>e.id===exId); if(!se) return;
    if (bw) {
      const valid = se.sets.filter(st=>st.reps>0); if(!valid.length) return;
      const totalReps = valid.reduce((a,st)=>a+st.reps,0);
      points.push({date:formatDateShort(s.date), val:totalReps, top:`${totalReps} reps`});
      valid.forEach(st => {
        if (!bestReal || st.reps > bestReal.reps || (st.reps === bestReal.reps && st.weight > bestReal.weight)) bestReal = { weight: st.weight, reps: st.reps };
      });
    } else {
      const valid = se.sets.filter(st=>st.weight>0&&st.reps>0); if(!valid.length) return;
      // top set da sessão = maior peso (desempata por reps)
      let topSet = valid[0];
      valid.forEach(st => { if (st.weight > topSet.weight || (st.weight === topSet.weight && st.reps > topSet.reps)) topSet = st; });
      points.push({date:formatDateShort(s.date), val:topSet.weight, top:`${topSet.weight}×${topSet.reps}`});
      valid.forEach(st => {
        if (!bestReal || st.weight > bestReal.weight || (st.weight === bestReal.weight && st.reps > bestReal.reps)) bestReal = { weight: st.weight, reps: st.reps };
        const e = estimate1RM(st.weight, st.reps);
        if (e > best1rm) best1rm = e;
      });
    }
  });

  const wrap = document.getElementById('chart-wrap'); if(!wrap) return;
  if (!points.length || !bestReal) { wrap.innerHTML=`<div class="no-data">Ainda não há dados para este exercício.</div>`; return; }

  const recent = points.slice(-10);
  const data = recent.map(p => ({ value: p.val, top: p.top, label: p.date }));
  const bestSession = bw ? Math.max(...points.map(p=>p.val)) : 0;

  // Card esquerdo: recorde REAL. Card direito: 1RM estimado (peso) ou melhor sessão (bodyweight).
  const realVal = bw
    ? `${bestReal.reps}<span class="e1rm-unit"> reps</span>`
    : `${bestReal.weight}<span class="e1rm-unit">kg</span>`;
  const realSub = bw
    ? (bestReal.weight > 0 ? `+${bestReal.weight}kg lastro` : 'Recorde de reps')
    : `${bestReal.reps} reps`;

  let html = `<div class="e1rm-summary">
    <div class="e1rm-item"><div class="e1rm-val">${realVal}</div><div class="e1rm-lbl">${bw?'Melhor série':'Recorde · '+realSub}</div></div>`;
  if (!bw) {
    html += `<div class="e1rm-item"><div class="e1rm-val" style="color:var(--text2)">${Math.round(best1rm)}<span class="e1rm-unit">kg</span></div><div class="e1rm-lbl">1RM estimado</div></div>`;
  } else {
    html += `<div class="e1rm-item"><div class="e1rm-val" style="color:var(--text2)">${bestSession}<span class="e1rm-unit"> reps</span></div><div class="e1rm-lbl">Melhor sessão</div></div>`;
  }
  html += `</div>`;
  html += svgLine(data);
  html += bw
    ? `<div class="e1rm-note">Progresso por total de repetições por sessão. Quando fizeres 3×${exDef(exId)?.repsMax||10} folgado, adiciona lastro.</div>`
    : `<div class="e1rm-note">Evolução do peso real (série mais pesada de cada sessão). Cada ponto mostra peso × repetições.</div>`;
  wrap.innerHTML = html;
}

function calcWeeklyVolume(sessions) {
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    // ISO week key (year-week)
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    const weekNum = Math.floor((d - startOfYear) / (7*24*60*60*1000));
    const key = `${d.getFullYear()}-${weekNum}`;
    if (!weeks[key]) weeks[key] = { vol: 0, count: 0, date: d };
    weeks[key].vol += calcVolume(s);
    weeks[key].count += 1;
  });
  return Object.values(weeks)
    .sort((a,b)=>a.date-b.date)
    .map(w => ({ vol: w.vol, count: w.count, label: `${w.date.getDate()}/${w.date.getMonth()+1}` }));
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const weeks = new Set(sessions.map(s => {
    const d = new Date(s.date);
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    return Math.floor((d - startOfYear) / (7*24*60*60*1000));
  }));
  const weeksArr = [...weeks].sort((a,b)=>b-a);
  let streak = 0;
  const currentWeek = weeksArr[0];
  for (let i=0; i<weeksArr.length; i++) {
    if (weeksArr[i] === currentWeek - i) streak++;
    else break;
  }
  return streak;
}

function calcPRs(sessions, allEx) {
  const prs = [];
  allEx.forEach(ex => {
    const bw = isBodyweight(ex.id);
    let best = null;
    sessions.forEach(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return;
      se.sets.forEach(st => {
        if (bw) {
          // Peso corporal: recorde = mais reps (desempata por lastro, se houver)
          if (st.reps > 0) {
            if (!best || st.reps > best.reps || (st.reps === best.reps && st.weight > best.weight)) {
              best = { weight: st.weight, reps: st.reps };
            }
          }
        } else if (st.weight > 0 && st.reps > 0) {
          if (!best || st.weight > best.weight || (st.weight === best.weight && st.reps > best.reps)) {
            best = { weight: st.weight, reps: st.reps };
          }
        }
      });
    });
    if (best) {
      const def = exDef(ex.id);
      const muscle = def && def.muscles && def.muscles.length ? def.muscles[0] : 'outro';
      prs.push({ name: ex.name, weight: best.weight, reps: best.reps, bodyweight: bw, muscle });
    }
  });
  return prs;
}

function renderNutricao() {
  const container = document.getElementById('view-nutricao');
  const p = NUTRITION_PLAN;

  // ----- Próxima refeição com base na hora atual -----
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const toMin = (t) => { const [h, m] = t.replace('h', ':').split(':'); return (+h) * 60 + (+(m || 0)); };
  let nextMeal = null, nextDiff = Infinity, nextIdx = -1;
  p.meals.forEach((meal, idx) => {
    const mMin = toMin(meal.time);
    let diff = mMin - nowMin;
    if (diff < -30) diff += 1440; // já passou há mais de 30min → conta para amanhã
    if (diff < nextDiff) { nextDiff = diff; nextMeal = meal; nextIdx = idx; }
  });

  let html = `<div class="nutri-header">
    <p class="section-title" style="margin-bottom:4px">Plano Alimentar</p>
    <div class="nutri-sub">${p.nutricionista} · ${p.updated}</div>
  </div>`;

  // ----- Destaque: próxima refeição -----
  if (nextMeal) {
    const mins = nextDiff;
    let when;
    if (mins <= 0) when = 'Agora';
    else if (mins < 60) when = `Daqui a ${mins} min`;
    else when = `Às ${nextMeal.time}`;
    html += `<div class="nutri-next" onclick="goToMeal(${nextIdx})">
      <div class="nutri-next-label">Próxima refeição · ${when}</div>
      <div class="nutri-next-name">${nextMeal.name}</div>
      <div class="nutri-next-time">${nextMeal.time}</div>
    </div>`;
  }

  // ----- Sub-abas (Corpo saiu para aba principal própria) -----
  const tabs = [['meals','Refeições'],['fruit','Fruta'],['rules','Regras']];
  html += `<div class="nutri-subtabs">`;
  tabs.forEach(([key, label]) => {
    html += `<button class="nutri-subtab${_nutriTab===key?' active':''}" onclick="setNutriTab('${key}')">${label}</button>`;
  });
  html += `</div><div class="nutri-content">`;

  if (_nutriTab === 'meals') html += nutriMealsHTML(p);
  else if (_nutriTab === 'fruit') html += nutriFruitHTML(p);
  else if (_nutriTab === 'rules') html += nutriRulesHTML(p);
  else if (_nutriTab === 'measures') html += nutriMealsHTML(p); // fallback: 'measures' já não é sub-aba

  html += `</div>`;
  container.innerHTML = html;
}

function setNutriTab(tab) {
  _nutriTab = tab;
  renderNutricao();
}

function goToMeal(idx) {
  _nutriTab = 'meals';
  renderNutricao();
  // depois de renderizar, faz scroll até à refeição e destaca-a brevemente
  setTimeout(() => {
    const el = document.getElementById('meal-' + idx);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const vals = recs.map(r => r[k]);
    if (vals.some(v => v != null)) html += ibSparklineFromRecs(name, unit, vals, labels, k);
  });

  // Segmentos do último registo (se existirem)
  const segDefs = [['seg_braco_esq','Braço esq.'],['seg_braco_dir','Braço dir.'],['seg_perna_esq','Perna esq.'],['seg_perna_dir','Perna dir.'],['seg_tronco','Tronco']];
  const segs = segDefs.filter(([k]) => last[k] != null);
  if (segs.length) {
    html += `<div class="ib-section-title">Massa magra por segmento</div>
      <div class="nutri-card"><div class="nutri-card-intro">Distribuição da massa muscular (kg). Útil para acompanhar simetria entre lados.</div>`;
    segs.forEach(([k,name]) => {
      html += `<div class="ib-seg"><span class="ib-seg-name">${name}</span><span class="ib-seg-val">${fmt(last[k])} kg</span></div>`;
    });
    html += `</div>`;

    // Comparação de simetria esquerdo vs direito (relevante p/ lado direito mais fraco)
    html += symmetryHTML(last);
  }

  // Tabelas de perímetros e pregas (a partir dos registos)
  html += `<div class="ib-section-title">Perímetros & Pregas</div>`;
  const perDefs = [['p_braco','Braço'],['p_coxa','Coxa'],['p_gemeo','M. Gémeo'],['p_ombros','Ombros'],['p_peito','Peito'],['p_cintura','Cintura'],['p_abdominal','Abdominal'],['p_anca','Anca']];
  const pregDefs = [['pr_bicipital','Bicipital'],['pr_tricipital','Tricipital'],['pr_subscapular','Subscapular'],['pr_ilieocristal','Ilieocristal'],['pr_abdominal','Abdominal'],['pr_supraespinal','Supraespinal'],['pr_crural','Crural'],['pr_geminal','Geminal']];
  html += measureTableFromRecs('Perímetros (cm)', perDefs, recs, labels, { expanded: _measExpanded['Perímetros (cm)'] });
  html += measureTableFromRecs('Pregas (mm)', pregDefs, recs, labels, { expanded: _measExpanded['Pregas (mm)'] });

  // Lista de avaliações (editar/apagar)
  html += `<div class="ib-section-title">Avaliações registadas</div><div class="nutri-card" style="padding:6px 16px">`;
  [...recs].reverse().forEach(r => {
    html += `<div class="meas-row">
      <div><div class="meas-row-date">${mLabelFull(r.data)}</div><div class="meas-row-fonte">${r.fonte||'—'}${r.peso!=null?' · '+fmt(r.peso)+'kg':''}</div></div>
      <div class="meas-row-actions">
        <button onclick="openMeasureForm(${r.id})">Editar</button>
        <button class="meas-del" onclick="deleteMeasure(${r.id})">Apagar</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function symmetryHTML(rec) {
  const pairs = [
    ['Braço', 'seg_braco_esq', 'seg_braco_dir'],
    ['Perna', 'seg_perna_esq', 'seg_perna_dir'],
  ];
  const rows = pairs.filter(([_,e,d]) => rec[e] != null && rec[d] != null);
  if (!rows.length) return '';
  let html = `<div class="ib-section-title">Simetria esquerdo / direito</div>
    <div class="nutri-card"><div class="nutri-card-intro">Massa magra de cada lado (kg). Acompanhar o equilíbrio — o lado direito tende a ser mais fraco.</div>`;
  rows.forEach(([name, ke, kd]) => {
    const e = Number(rec[ke]), d = Number(rec[kd]);
    const max = Math.max(e, d);
    const diffPct = max > 0 ? Math.round(((max - Math.min(e, d)) / max) * 1000) / 10 : 0;
    const fracaoDir = d < e;
    const pe = Math.round((e / (e + d)) * 100);
    const pd = 100 - pe;
    const balanced = diffPct < 2;
    const note = balanced ? 'Equilibrado' : `${fracaoDir ? 'Direito' : 'Esquerdo'} mais fraco · ${String(diffPct).replace('.', ',')}%`;
    html += `<div class="sym-row">
      <div class="sym-head"><span class="sym-name">${name}</span><span class="sym-note ${balanced?'ok':'warn'}">${note}</span></div>
      <div class="sym-bar">
        <div class="sym-side sym-left" style="width:${pe}%">${String(e).replace('.', ',')}</div>
        <div class="sym-side sym-right" style="width:${pd}%">${String(d).replace('.', ',')}</div>
      </div>
      <div class="sym-labels"><span>Esq.</span><span>Dir.</span></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function mLabel(iso) {

}

function ibSparklineFromRecs(name, unit, vals, labels, key) {
  // Filtra pares (valor, label) onde há valor
  const pairs = vals.map((v,i)=>[v,labels[i]]).filter(p=>p[0]!=null);
  if (pairs.length < 2) {
    const only = pairs.length ? `${String(pairs[0][0]).replace('.',',')}${unit}` : '—';
    return `<div class="ib-spark"><div class="ib-spark-head"><span class="ib-spark-name">${name}</span><span class="ib-spark-now">${only}</span></div><div style="font-size:11px;color:var(--text3);font-family:var(--mono)">Precisa de 2+ avaliações para o gráfico.</div></div>`;
  }
  return ibSparkline({ name, unit, key, vals: pairs.map(p=>p[0]) }, pairs.map(p=>p[1]));
}

// Medidas onde DESCER é bom (gordura subcutânea / cintura). As pregas são todas assim.
const MEAS_LOWER_BETTER = new Set(['p_cintura','p_abdominal']);

function measureTableFromRecs(title, defs, recs, labels, opts) {
  opts = opts || {};
  const isPregas = /prega/i.test(title);
  // Mantém só as linhas que têm algum valor em qualquer avaliação
  let rows = defs.map(([k,name]) => [k, name, recs.map(r=>r[k])]).filter(([k,n,vals]) => vals.some(v=>v!=null));
  if (!rows.length) return '';

  // Quantas colunas mostrar: por defeito as últimas 4; 'ver tudo' mostra todas.
  const MAX_COLS = 4;
  const total = labels.length;
  const showAll = !!opts.expanded;
  const start = (showAll || total <= MAX_COLS) ? 0 : total - MAX_COLS;
  const visLabels = labels.slice(start);
  const scrollable = showAll && total > 6; // só precisa de scroll se forem muitas

  const tableId = 'meastbl_' + Math.random().toString(36).slice(2,8);
  let html = `<div class="nutri-card"${scrollable?' style="overflow-x:auto"':''}>
    <div class="nutri-rules-title" style="padding:0 0 10px">${title}</div>
    <table class="nutri-table"><thead><tr><th></th>`;
  visLabels.forEach(l => { html += `<th>${l}</th>`; });
  html += `<th class="meas-delta-h">Δ</th></tr></thead><tbody>`;

  rows.forEach(([k, name, allVals]) => {
    const vals = allVals.slice(start);
    html += `<tr><td class="nutri-tname">${name}</td>`;
    vals.forEach((v, i) => {
      const isLast = i === vals.length - 1;
      html += `<td class="${isLast?'nutri-last':''}">${v==null?'·':String(v).replace('.',',')}</td>`;
    });
    // Δ = primeiro valor não-nulo visível → último valor não-nulo visível
    const nn = vals.filter(v => v != null);
    let dCell = '<td class="meas-delta flat">·</td>';
    if (nn.length >= 2) {
      const d = Math.round((nn[nn.length-1] - nn[0]) * 10) / 10;
      const lowerBetter = isPregas || MEAS_LOWER_BETTER.has(k);
      let cls = 'flat';
      if (d !== 0) cls = (lowerBetter ? (d < 0) : (d > 0)) ? 'good' : 'bad';
      // sem juízo de cor para medidas ambíguas (braço, coxa, etc.): mantém neutro
      if (!lowerBetter && !isPregas && k !== 'p_cintura' && k !== 'p_abdominal') cls = 'flat';
      const txt = (d > 0 ? '+' : '') + String(d).replace('.',',');
      dCell = `<td class="meas-delta ${cls}">${txt}</td>`;
    }
    html += dCell + `</tr>`;
  });
  html += `</tbody></table>`;

  // Botão "ver tudo" só se houver mais avaliações do que as mostradas
  if (!showAll && total > MAX_COLS) {
    html += `<button class="meas-showall" onclick="toggleMeasAll(this,'${title.replace(/'/g,"")}')">Ver todas as ${total} avaliações</button>`;
  } else if (showAll && total > MAX_COLS) {
    html += `<button class="meas-showall" onclick="toggleMeasAll(this,'${title.replace(/'/g,"")}')">Mostrar só as últimas ${MAX_COLS}</button>`;
  }
  html += `</div>`;
  return html;
}

function ibSparkline(metric, labels) {
  const vals = metric.vals;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const W = 300, H = 70, pad = 6;
  const stepX = (W - pad*2) / (vals.length - 1);
  // pontos
  const pts = vals.map((v, i) => {
    const x = pad + i * stepX;
    const y = pad + (H - pad*2) * (1 - (v - min) / range);
    return [x, y];
  });
  const linePath = pts.map((pt, i) => `${i===0?'M':'L'}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(' ');
  // Variação: última (penúltimo → último ponto) em destaque + total (primeiro → último) ao lado.
  const first = vals[0], last = vals[vals.length-1];
  const prev = vals.length >= 2 ? vals[vals.length-2] : last;
  const lastDiff = Math.round((last - prev) * 10) / 10;   // variação recente
  const totalDiff = Math.round((last - first) * 10) / 10; // acumulado do período
  const fmtDiff = (d) => (d > 0 ? '+' : '') + String(d).replace('.',',') + metric.unit;
  const lastTxt = fmtDiff(lastDiff);
  const totalTxt = fmtDiff(totalDiff);
  // Direção "boa": gordura/massa gorda → descer é bom; peso → neutro; resto → subir é bom.
  const lowerIsBetter = (metric.key === 'gordura' || metric.key === 'massa_gorda');
  const neutralMetric = (metric.key === 'peso');
  let diffCls = 'flat';
  if (lastDiff !== 0 && !neutralMetric) {
    const good = lowerIsBetter ? (lastDiff < 0) : (lastDiff > 0);
    diffCls = good ? 'good' : 'bad';
  }

  let circles = '';
  pts.forEach((pt, i) => {
    const isLast = i === pts.length - 1;
    circles += `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="${isLast?4:2.5}" fill="${isLast?'#39FF88':'#6a7d72'}"/>`;
  });

  return `<div class="ib-spark">
    <div class="ib-spark-head">
      <span class="ib-spark-name">${metric.name}</span>
      <span class="ib-spark-now">${String(last).replace('.',',')}${metric.unit} <span class="ib-spark-diff ${diffCls}">${lastTxt}</span><span class="ib-spark-total">${totalTxt} total</span></span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="ib-spark-svg">
      <path d="${linePath}" fill="none" stroke="#39FF88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${circles}
    </svg>
    <div class="ib-spark-labels">${labels.map(l=>`<span>${l}</span>`).join('')}</div>
  </div>`;
}

// Mostra a nota de execução do exercício (botão "!")
function showExNote(exId) {
  const note = EX_NOTES[exId];
  if (!note) return;
  // nome do exercício
  let nome = '';
  for (const k in WORKOUTS) {
    const ex = WORKOUTS[k].exercises.find(e => e.id === exId);
    if (ex) { nome = ex.name; break; }
  }
  // Parsing: a nota tem o formato "Músculo. Frase. Frase. ..."
  // 1ª frase = músculo (etiqueta) · frases com termos de cuidado = caixa laranja · resto = passos.
  const parts = note.split('. ').map(s => s.trim()).filter(Boolean).map(s => s.replace(/\.$/, ''));
  const muscle = parts.length ? parts[0] : '';
  const rest = parts.slice(1);
  const careRe = /(cuidado|atenção|essencial para a saúde|não forçar|com cuidado)/i;
  const steps = [], cares = [];
  rest.forEach(p => { (careRe.test(p) ? cares : steps).push(p); });

  document.getElementById('exnote-muscle').textContent = muscle;
  document.getElementById('exnote-title').textContent = nome || 'Como fazer';

  let bodyHtml = '';
  steps.forEach(s => {
    bodyHtml += `<div class="exnote-step"><span class="exnote-step-dot"></span><span class="exnote-step-text">${s}.</span></div>`;
  });
  cares.forEach(c => {
    bodyHtml += `<div class="exnote-care"><svg class="exnote-care-icon" viewBox="0 0 24 24" fill="none" stroke="#ffb877" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="exnote-care-text">${c}.</span></div>`;
  });
  document.getElementById('exnote-body').innerHTML = bodyHtml;
  document.getElementById('exnote-modal').classList.add('open');
}

function closeExNote(ev) {
  if (ev && ev.target && ev.target.id !== 'exnote-modal' && !ev.target.classList.contains('exnote-close')) {
    // só fecha se clicou no fundo ou no botão fechar
    if (ev.type === 'click' && ev.target.closest('.exnote-sheet') && !ev.target.classList.contains('exnote-close')) return;
  }
  document.getElementById('exnote-modal').classList.remove('open');
}

async function saveMeasureForm() {
  const num = (k) => { const el = document.getElementById('mf-'+k); const val = parseFloat(el?.value); return isFinite(val) ? val : null; };
  const data = document.getElementById('mf-data').value;
  if (!data) { showToast('Escolhe a data'); return; }
  const fonte = document.getElementById('mf-fonte').value;
  const rec = { id: _editingMeasureId || Date.now(), data, fonte };
  ['comp','per','preg','avancado'].forEach(gk => {
    MEAS_FIELDS[gk].fields.forEach(([k]) => {
      rec[k] = num(k);
    });
  });
  showToast('A guardar...');
  const ok = await sb.saveMeasurement(rec);
  if (ok) {
    await loadMeasurements();
    closeMeasureForm();
    showToast('Avaliação guardada ✓');
    renderNutricao();
  } else {
    showToast('Erro ao guardar');
  }
}

async function deleteMeasure(id) {
  if (!await confirmModal({title:'Apagar avaliação?', message:'Esta medição será removida em definitivo.', confirmLabel:'Apagar', danger:true})) return;
  showToast('A apagar...');
  const ok = await sb.deleteMeasurement(id);
  if (ok) {
    await loadMeasurements();
    showToast('Avaliação apagada');
    renderNutricao();
  } else {
    showToast('Erro ao apagar');
  }
}

// Comprime/recorta uma imagem para um quadrado de 'size' px, devolve um Blob JPEG.
function compressImage(file, size) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob falhou')), 'image/jpeg', 0.85);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function importData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions||!Array.isArray(data.sessions)) throw new Error('Formato inválido');
      const current = getSessions();
      let mode = 'replace';
      if (current.length > 0) {
        mode = await choiceModal({
          title: 'Importar backup',
          message: `Tens ${current.length} ${current.length===1?'sessão':'sessões'} guardada${current.length===1?'':'s'}. O backup tem ${data.sessions.length}. O que queres fazer?`,
          choices: [
            { label: 'Substituir tudo', value: 'replace', style: 'danger' },
            { label: 'Combinar (juntar novas)', value: 'merge', style: 'primary' },
            { label: 'Cancelar', value: null, style: 'ghost' },
          ]
        });
        if (!mode) { event.target.value=''; return; }  // cancelado
      }
      let toImport;
      if (mode === 'replace') {
        // Substituir: apagar as atuais e gravar as do backup
        for (const s of current) { await sb.deleteSession(s.id); }
        toImport = data.sessions;
      } else {
        // Combinar: só as que ainda não existem
        const existingIds = new Set(current.map(s=>s.id));
        toImport = data.sessions.filter(s=>!existingIds.has(s.id));
      }
      let n = 0;
      for (const s of toImport) { await sb.saveSession(s); n++; }
      _sessions = await sb.getSessions();
      showToast(`${n} sessões importadas ✓`);
      setTimeout(()=>renderDados(), 500);
    } catch(err) { showToast('Ficheiro inválido'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Peso corporal de referência para o volume das pull-ups.
// Usa o peso do perfil (atualizável); se não houver, a média das pesagens InBody (~84.7kg).
const INBODY_AVG_WEIGHT = 84.7;
function refBodyWeight() {
  const bw = bodyWeight();
  return (bw && bw > 0) ? bw : INBODY_AVG_WEIGHT;
}
function calcVolume(s){
  let v=0;
  s.exercises.forEach(ex=>{
    const bw = isBodyweight(ex.id) ? refBodyWeight() : 0;
    ex.sets.forEach(st=>{
      if(st.reps>0){
        if(bw>0){ v += (bw + (st.weight>0?st.weight:0)) * st.reps; }       // pull-ups: corpo + lastro
        else if(st.weight>0){ v += st.weight*st.reps; }                     // restantes: carga externa
      }
    });
  });
  return Math.round(v);
}

// Modal de confirmação UNFYN (substitui confirm() nativo). Devolve uma Promise<boolean>.
// opts: { title, message, confirmLabel, cancelLabel, danger }
function confirmModal(opts) {
  return new Promise(resolve => {
    const modal = document.getElementById('confirm-modal');
    const titleEl = document.getElementById('confirm-title');
    const msgEl = document.getElementById('confirm-msg');
    const actions = document.getElementById('confirm-actions');
    titleEl.textContent = opts.title || 'Confirmar';
    msgEl.textContent = opts.message || '';
    msgEl.style.display = opts.message ? 'block' : 'none';
    actions.innerHTML = '';
    const close = (val) => {
      modal.classList.remove('open');
      resolve(val);
    };
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'confirm-btn ' + (opts.danger ? 'danger' : 'primary');
    confirmBtn.textContent = opts.confirmLabel || 'Confirmar';
    confirmBtn.onclick = () => close(true);
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'confirm-btn ghost';
    cancelBtn.textContent = opts.cancelLabel || 'Cancelar';
    cancelBtn.onclick = () => close(false);
    actions.appendChild(confirmBtn);
    actions.appendChild(cancelBtn);
    // tocar fora = cancelar
    modal.onclick = (e) => { if (e.target === modal) close(false); };
    modal.classList.add('open');
  });
}

// Modal de 3 opções (ex: Substituir / Combinar / Cancelar). Devolve a string da escolha ou null.
function choiceModal(opts) {
  return new Promise(resolve => {
    const modal = document.getElementById('confirm-modal');
    const titleEl = document.getElementById('confirm-title');
    const msgEl = document.getElementById('confirm-msg');
    const actions = document.getElementById('confirm-actions');
    titleEl.textContent = opts.title || 'Escolhe';
    msgEl.textContent = opts.message || '';
    msgEl.style.display = opts.message ? 'block' : 'none';
    actions.innerHTML = '';
    const close = (val) => { modal.classList.remove('open'); resolve(val); };
    (opts.choices || []).forEach(ch => {
      const b = document.createElement('button');
      b.className = 'confirm-btn ' + (ch.style || 'primary');
      b.textContent = ch.label;
      b.onclick = () => close(ch.value);
      actions.appendChild(b);
    });
    modal.onclick = (e) => { if (e.target === modal) close(null); };
    modal.classList.add('open');
  });
}

// Parse rest text like "2–3 min", "90 seg" into seconds (uses the upper bound)
function parseRestSeconds(txt) {
  if (!txt) return 60;
  const t = txt.toLowerCase();
  // minutes range e.g. "2–3 min" or "2-3 min" -> take upper
  const minMatch = t.match(/(\d+)\s*[–-]\s*(\d+)\s*min/);
  if (minMatch) return parseInt(minMatch[2]) * 60;
  const singleMin = t.match(/(\d+)\s*min/);
  if (singleMin) return parseInt(singleMin[1]) * 60;
  const secMatch = t.match(/(\d+)\s*seg/);
  if (secMatch) return parseInt(secMatch[1]);
  return 60;
}

// Saltar o descanso: decisão consciente de avançar (o descanso não se pausa).
function skipRest() {
  stopBigTimer();
  bt.autoRest = false;
  const m = document.getElementById('timer-modal');
  m.classList.remove('open');
  m.classList.remove('running');
  m.classList.remove('auto-rest');
  hideMiniTimer();
  clearRestDoneState();
}

// Open timer in countdown mode pre-set to the given seconds and start immediately
function startRest(seconds) {
  bt.autoRest = true;
  hideRestDoneAlert();
  clearRestDoneState();
  hideMiniTimer();
  const modal = document.getElementById('timer-modal');
  modal.classList.add('open');
  modal.classList.add('auto-rest');   // modo descanso: sem pausar (corre até ao fim)
  setTimerMode('simple');
  bt.simpleTime = seconds;
  bt.remaining = seconds;
  renderBigTimer();
  startBigTimer();
}
function closeTimerModal() {
  // If a timer is actively running, don't kill it — minimize to a floating bar
  // so it keeps counting while you register your sets behind it.
  if (bt.running) { minimizeTimer(); return; }
  stopBigTimer();
  const m = document.getElementById('timer-modal');
  m.classList.remove('open');
  m.classList.remove('running');
  m.classList.remove('auto-rest');
  hideMiniTimer();
}

  const m = document.getElementById('timer-modal');
  m.classList.remove('open');           // hide fullscreen modal
  const lockOv = document.getElementById('timer-lock-overlay');
  if (lockOv) lockOv.classList.remove('active');
  // timer keeps running (bt.running stays true, interval still ticking)
  showMiniTimer();
  updateMiniTimer();
}

// Ícone do botão superior do cronómetro: minimizar (quando corre) ou fechar (parado).
const ICON_MINIMIZE = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
function updateTimerCloseBtn() {
  const btn = document.getElementById('timer-close-btn');
  if (!btn) return;
  if (bt.running) {
    btn.innerHTML = ICON_MINIMIZE;
    btn.setAttribute('aria-label', 'Minimizar cronómetro');
  } else {
    btn.textContent = '✕';
    btn.setAttribute('aria-label', 'Fechar cronómetro');
  }
}

function reopenTimer() {
  const mini = document.getElementById('timer-mini');
  if (mini && mini.classList.contains('done')) { hideRestDoneAlert(); return; }
  const m = document.getElementById('timer-modal');
  m.classList.add('open');
  hideMiniTimer();
  renderBigTimer();
  updateTimerCloseBtn();
}

// ===== Water lock (prevents accidental taps from sweat/water) =====
let _lockHoldStart = 0;
let _lockHoldRAF = null;
const LOCK_HOLD_MS = 2000;

function lockTimer() {
  const ov = document.getElementById('timer-lock-overlay');
  if (ov) ov.classList.add('active');
}

function unlockBegin(e) {
  if (e && e.cancelable) e.preventDefault();
  _lockHoldStart = Date.now();
  const ringFill = document.getElementById('lock-ring-fill');
  const step = () => {
    const held = Date.now() - _lockHoldStart;
    const pct = Math.min(1, held / LOCK_HOLD_MS);
    if (ringFill) ringFill.style.strokeDashoffset = String(214 * (1 - pct));
    if (pct >= 1) { unlockComplete(); return; }
    _lockHoldRAF = requestAnimationFrame(step);
  };
  _lockHoldRAF = requestAnimationFrame(step);
}

function unlockCancel() {
  if (_lockHoldRAF) cancelAnimationFrame(_lockHoldRAF);
  _lockHoldRAF = null;
  const ringFill = document.getElementById('lock-ring-fill');
  if (ringFill) ringFill.style.strokeDashoffset = '214';
}

function unlockComplete() {
  if (_lockHoldRAF) cancelAnimationFrame(_lockHoldRAF);
  _lockHoldRAF = null;
  const ov = document.getElementById('timer-lock-overlay');
  if (ov) ov.classList.remove('active');
  const ringFill = document.getElementById('lock-ring-fill');
  if (ringFill) ringFill.style.strokeDashoffset = '214';
  if (navigator.vibrate) navigator.vibrate(40);
}

let _restDoneTimeout = null;
function showRestDoneBig() {
  const m = document.getElementById('timer-modal');
  if (!m) return;
  hideMiniTimer();
  // Garante o cronómetro aberto e limpa o estado de "a correr" (cores de fase)
  m.classList.add('open');
  m.classList.remove('running','phase-prep','phase-work','phase-rest');
  m.classList.add('rest-done-active');
  if (_restDoneTimeout) clearTimeout(_restDoneTimeout);
  _restDoneTimeout = setTimeout(dismissRestDone, 12000);
}
function dismissRestDone() {
  if (_restDoneTimeout) { clearTimeout(_restDoneTimeout); _restDoneTimeout = null; }
  const m = document.getElementById('timer-modal');
  if (!m || !m.classList.contains('rest-done-active')) return;
  m.classList.remove('rest-done-active');
  // Fecha o cronómetro e volta ao treino (como o auto-descanso fazia antes)
  m.classList.remove('open','running');
  const fab = document.getElementById('timer-fab');
  if (fab) fab.style.display = '';
}
function clearRestDoneState() {
  if (_restDoneTimeout) { clearTimeout(_restDoneTimeout); _restDoneTimeout = null; }
  const m = document.getElementById('timer-modal');
  if (m) m.classList.remove('rest-done-active');
}

function hideRestDoneAlert() {
  if (_restDoneTimeout) { clearTimeout(_restDoneTimeout); _restDoneTimeout = null; }
  const el = document.getElementById('timer-mini');
  if (el) el.classList.remove('done');
  hideMiniTimer();
}

function showMiniTimer() {
  const el = document.getElementById('timer-mini');
  if (el) el.classList.add('show');
  const fab = document.getElementById('timer-fab');
  if (fab) fab.style.display = 'none';
}
function hideMiniTimer() {
  const el = document.getElementById('timer-mini');
  if (el) el.classList.remove('show');
  const fab = document.getElementById('timer-fab');
  if (fab) fab.style.display = '';
}

function updateMiniTimer() {
  const el = document.getElementById('timer-mini');
  if (!el || !el.classList.contains('show')) return;
  const iconEl = document.getElementById('timer-mini-icon');
  const labelEl = document.getElementById('timer-mini-label');
  const timeEl = document.getElementById('timer-mini-time');
  if (iconEl) iconEl.innerHTML = SVG.timer;
  let label, timeText;
  if (bt.mode === 'stopwatch') {
    label = 'Cronómetro';
    timeText = fmtBig(bt.elapsed);
  } else if (bt.mode === 'interval') {
    label = bt.phase === 'prep' ? 'Get Ready' : (bt.phase === 'work' ? `Work ${bt.currentRound}/${bt.rounds}` : `Rest ${bt.currentRound}/${bt.rounds}`);
    timeText = String(bt.remaining);
  } else {
    label = 'Descanso';
    timeText = fmtBig(bt.remaining);
  }
  if (labelEl) labelEl.textContent = label;
  if (timeEl) timeEl.textContent = timeText;
}

function setTimerMode(mode) {
  bt.mode = mode;
  document.getElementById('tm-stopwatch').classList.toggle('active', mode === 'stopwatch');
  document.getElementById('tm-simple').classList.toggle('active', mode === 'simple');
  document.getElementById('tm-interval').classList.toggle('active', mode === 'interval');
  document.getElementById('timer-stopwatch-config').style.display = mode === 'stopwatch' ? 'block' : 'none';
  document.getElementById('timer-simple-config').style.display = mode === 'simple' ? 'block' : 'none';
  document.getElementById('timer-interval-config').style.display = mode === 'interval' ? 'block' : 'none';
  document.getElementById('timer-modal').classList.toggle('mode-interval', mode === 'interval');
  resetBigTimer();
}

function setSimpleTime(sec) {
  bt.simpleTime = sec;
  resetBigTimer();
}

let _holdTimeout = null, _holdInterval = null;

function setupIntervalSteppers() {
  document.querySelectorAll('.timer-stepper button[data-step]').forEach(btn => {
    const field = btn.dataset.step;
    const delta = parseInt(btn.dataset.delta, 10);
    const fire = () => adjInt(field, delta);

    const start = (e) => {
      e.preventDefault();
      fire(); // primeiro passo imediato
      // após 450ms começa a repetir; acelera ao longo do tempo
      let speed = 180;
      _holdTimeout = setTimeout(function tick() {
        fire();
        speed = Math.max(40, speed - 15); // acelera
        _holdInterval = setTimeout(tick, speed);
      }, 450);
    };
    const stop = () => {
      if (_holdTimeout) { clearTimeout(_holdTimeout); _holdTimeout = null; }
      if (_holdInterval) { clearTimeout(_holdInterval); _holdInterval = null; }
    };

    btn.addEventListener('touchstart', start, {passive:false});
    btn.addEventListener('touchend', stop);
    btn.addEventListener('touchcancel', stop);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
    btn.addEventListener('mouseleave', stop);
  });
}

function adjInt(field, delta) {
  if (field === 'prep') bt.prep = Math.max(0, bt.prep + delta);
  if (field === 'work') bt.work = Math.max(5, bt.work + delta);
  if (field === 'rest') bt.rest = Math.max(5, bt.rest + delta);
  if (field === 'rounds') bt.rounds = Math.max(1, bt.rounds + delta);
  document.getElementById('int-prep').textContent = bt.prep;
  document.getElementById('int-work').textContent = bt.work;
  document.getElementById('int-rest').textContent = bt.rest;
  document.getElementById('int-rounds').textContent = bt.rounds;
  resetBigTimer();
}


function fmtBig(sec) {
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function getNextPhaseLabel() {
  if (bt.mode !== 'interval') return '';
  if (bt.phase === 'prep') return `Next: Work ${bt.work}s`;
  if (bt.phase === 'work') return `Next: Rest ${bt.rest}s`;
  // phase === 'rest'
  if (bt.currentRound >= bt.rounds) return 'Next: Finish';
  return `Next: Work · Round ${bt.currentRound+1}/${bt.rounds}`;
}

// Total seconds left in the whole interval session: current phase remaining
// + every work/rest phase that still comes after it.
function getIntervalTotalRemaining() {
  let worksLeft, restsLeft;
  if (bt.phase === 'prep') {
    worksLeft = bt.rounds;
    restsLeft = bt.rounds - 1;
  } else if (bt.phase === 'work') {
    worksLeft = bt.rounds - bt.currentRound;
    restsLeft = bt.rounds - bt.currentRound;
  } else { // rest
    worksLeft = bt.rounds - bt.currentRound;
    restsLeft = bt.rounds - bt.currentRound - 1;
  }
  const total = bt.remaining + worksLeft * bt.work + Math.max(0, restsLeft) * bt.rest;
  return Math.max(0, total);
}

function renderBigTimer() {
  const disp = document.getElementById('timer-display-big');
  const phaseEl = document.getElementById('timer-phase');
  const nextEl = document.getElementById('timer-next');
  const totalEl = document.getElementById('timer-total');
  const modal = document.getElementById('timer-modal');
  // clear phase background classes by default
  modal.classList.remove('phase-prep','phase-work','phase-rest');
  if (totalEl) totalEl.textContent = '';
  if (bt.mode === 'stopwatch') {
    disp.textContent = fmtBig(bt.elapsed);
    disp.className = 'timer-display-big';
    phaseEl.textContent = '';
    nextEl.textContent = '';
    return;
  }
  if (bt.mode === 'interval') {
    // big number = seconds of the current phase, plain (5, 10, 63, 70...)
    disp.textContent = String(bt.remaining);
    if (bt.phase === 'prep') {
      disp.className = 'timer-display-big prep';
      phaseEl.textContent = 'Get Ready…';
      modal.classList.add('phase-prep');
    } else {
      disp.className = 'timer-display-big ' + (bt.phase === 'rest' ? 'rest' : 'work');
      phaseEl.textContent = bt.phase === 'work' ? 'Work' : 'Rest';
      modal.classList.add(bt.phase === 'rest' ? 'phase-rest' : 'phase-work');
    }
    // round + next phase go on the lower line
    const roundTxt = bt.phase === 'prep' ? '' : `Round ${bt.currentRound}/${bt.rounds}`;
    const nextTxt = getNextPhaseLabel();
    nextEl.textContent = roundTxt ? `${roundTxt} · ${nextTxt}` : nextTxt;
    if (totalEl) totalEl.textContent = fmtBig(getIntervalTotalRemaining());
  } else {
    // simple countdown: keep MM:SS
    disp.textContent = fmtBig(bt.remaining);
    disp.className = 'timer-display-big';
    phaseEl.textContent = '';
    nextEl.textContent = '';
  }
}

// Shared loud output chain: a compressor + makeup gain pushes perceived
// loudness close to the phone speaker's ceiling without harsh clipping.
function getAudioDest() {
  if (!bt.audioCtx) bt.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (bt.audioCtx.state === 'suspended') bt.audioCtx.resume();
  if (!bt.masterChain) {
    const ctx = bt.audioCtx;
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -16;
    comp.knee.value = 10;
    comp.ratio.value = 14;
    comp.attack.value = 0.002;
    comp.release.value = 0.25;
    const makeup = ctx.createGain();
    makeup.gain.value = 1.6;
    comp.connect(makeup);
    makeup.connect(ctx.destination);
    bt.masterChain = comp;
  }
  return bt.masterChain;
}

function beep(freq, dur, vol) {
  try {
    const dest = getAudioDest();
    const ctx = bt.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(dest);
    osc.frequency.value = freq;
    // 'triangle' cuts through gym noise better than pure sine, without being harsh
    osc.type = 'triangle';
    const v = vol != null ? vol : 0.9;
    gain.gain.setValueAtTime(v, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// Quiet feedback tick for manual skip taps (not an alert sound)
function uiTick() { beep(650, 0.05, 0.35); }

// Bell-like "ding": layered harmonics with independent decay — much richer
// than a single sine. Used for "fim do set" / "fim de tudo".
function bell(freqBase, vol) {
  try {
    const dest = getAudioDest();
    const ctx = bt.audioCtx;
    const t0 = ctx.currentTime;
    const v = vol != null ? vol : 1.0;
    const partials = [
      {ratio:1,   amp:1.00, decay:1.0},
      {ratio:2.0, amp:0.6,  decay:0.85},
      {ratio:3.0, amp:0.4,  decay:0.65},
      {ratio:4.2, amp:0.25, decay:0.5},
      {ratio:5.4, amp:0.15, decay:0.35},
    ];
    partials.forEach(p => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = (freqBase || 880) * p.ratio;
      osc.connect(gain); gain.connect(dest);
      gain.gain.setValueAtTime(v * p.amp, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + p.decay);
      osc.start(t0);
      osc.stop(t0 + p.decay + 0.05);
    });
  } catch(e) {}
}

// Play several bell hits in a row (3x no fim do treino)

// Play a sequence of beeps: array of [freq, durationSec, gapSec]
function beepSequence(steps) {
  let t = 0;
  steps.forEach(([freq, dur, gap]) => {
    setTimeout(() => beep(freq, dur, 0.7), t * 1000);
    t += dur + (gap || 0);
  });
}

// Coach-style whistle: a bright, sustained tone with a slight upward chirp
function whistle() {
  try {
    const dest = getAudioDest();
    const ctx = bt.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    // subtle flutter, gentler than before
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 12; lfoGain.gain.value = 20;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    osc.connect(gain); gain.connect(dest);
    osc.type = 'sine';
    const t0 = ctx.currentTime;
    // warmer, less piercing tone (was 1800→2600Hz, now mid-range)
    osc.frequency.setValueAtTime(880, t0);
    osc.frequency.linearRampToValueAtTime(1180, t0 + 0.12);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.75, t0 + 0.05);
    gain.gain.setValueAtTime(0.75, t0 + 0.40);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.55);
    lfo.start(t0); osc.start(t0);
    lfo.stop(t0 + 0.55); osc.stop(t0 + 0.55);
  } catch(e) {}
}

function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} }

function tickBigTimer() {
  const now = Date.now();
  if (bt.mode === 'stopwatch') {
    // elapsed computed from real start time (accurate even after throttling)
    bt.elapsed = Math.floor((now - bt.startedAt) / 1000);
    renderBigTimer();
    updateMiniTimer();
    return;
  }
  // remaining computed from the real phase end time
  const newRemaining = Math.max(0, Math.round((bt.phaseEndsAt - now) / 1000));
  // beep on each of the last 3 seconds (only when the visible second actually changes)
  if (newRemaining < bt.remaining && newRemaining <= 3 && newRemaining > 0) {
    beep(700, 0.15, 0.85);
  }
  bt.remaining = newRemaining;

  if (bt.remaining <= 0) {
    if (bt.mode === 'simple') {
      beepSequence([[900,0.18,0.08],[900,0.18,0.08],[1100,0.45,0]]);
      vibrate([300,120,300]);
      stopBigTimer();
      bt.remaining = bt.simpleTime;
      if (bt.autoRest) {
        // Auto-descanso entre séries: mantém o cronómetro aberto e mostra um
        // aviso GRANDE no ecrã (legível a vários metros, telemóvel pousado).
        // Fecha sozinho ao fim de 12s, ou quando o utilizador toca.
        showRestDoneBig();
      } else {
        // Cronómetro manual (ex: prancha 30s/lado): NÃO fecha — fica aberto,
        // pronto a recomeçar com o mesmo tempo (ex: segundo lado) sem reabrir.
        renderBigTimer();
      }
      return;
    } else {
      if (bt.phase === 'prep') {
        bt.phase = 'work';
        bt.remaining = bt.work;
        bt.phaseEndsAt = now + bt.work * 1000;
        whistle();                   // apito = começa a trabalhar
        vibrate([250,100,250]);
      } else if (bt.phase === 'work') {
        bt.phase = 'rest';
        bt.remaining = bt.rest;
        bt.phaseEndsAt = now + bt.rest * 1000;
        bell(880, 1.0);               // sino = fim do set, entra em descanso
        vibrate([200,100,200]);
      } else {
        if (bt.currentRound >= bt.rounds) {
          whistle(); setTimeout(whistle, 600); setTimeout(whistle, 1200);  // 3 apitos = fim de tudo
          vibrate([300,120,300,120,300,120,400]);
          stopBigTimer();
          resetBigTimer();
          return;
        }
        bt.currentRound++;
        bt.phase = 'work';
        bt.remaining = bt.work;
        bt.phaseEndsAt = now + bt.work * 1000;
        whistle();                   // apito = começa a próxima ronda
        vibrate([250,100,250]);
      }
    }
  }
  renderBigTimer();
  updateMiniTimer();
}

function advanceBigTimerPhase(dir) {
  if (bt.mode !== 'interval') return;
  if (dir > 0) {
    if (bt.phase === 'prep') {
      bt.phase = 'work'; bt.remaining = bt.work;
    } else if (bt.phase === 'work') {
      bt.phase = 'rest'; bt.remaining = bt.rest;
    } else {
      if (bt.currentRound >= bt.rounds) { stopBigTimer(); resetBigTimer(); return; }
      bt.currentRound++; bt.phase = 'work'; bt.remaining = bt.work;
    }
  } else {
    if (bt.phase === 'work') {
      if (bt.currentRound > 1) {
        bt.currentRound--; bt.phase = 'rest'; bt.remaining = bt.rest;
      } else if (bt.prep > 0) {
        bt.phase = 'prep'; bt.remaining = bt.prep;
      } else {
        bt.remaining = bt.work;
      }
    } else if (bt.phase === 'rest') {
      bt.phase = 'work'; bt.remaining = bt.work;
    } else {
      bt.remaining = bt.prep;
    }
  }
  uiTick();
  if (bt.running) bt.phaseEndsAt = Date.now() + bt.remaining * 1000;
  renderBigTimer();
}

// ===== Shared screen Wake Lock (used by both workout session and timer) =====
let _wakeLock = null;
let _wakeLockWanted = false;

async function requestWakeLock() {
  _wakeLockWanted = true;
  try {
    if ('wakeLock' in navigator) {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch(e) {}
}
function releaseWakeLock() {
  _wakeLockWanted = false;
  try { if (_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch(e) {}
}
// iOS/Safari drops the lock when the tab is hidden; re-acquire when visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (_wakeLockWanted && !_wakeLock) requestWakeLock();
    // catch the timer up to real elapsed time right away
    if (bt.running) tickBigTimer();
  }
});

function startBigTimer() {
  if (bt.running) return;
  // init + unlock audio on user gesture (iOS requires this)
  try {
    if (!bt.audioCtx) bt.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (bt.audioCtx.state === 'suspended') bt.audioCtx.resume();
    // prime with a near-silent blip to unlock audio on iOS
    const o = bt.audioCtx.createOscillator();
    const g = bt.audioCtx.createGain();
    g.gain.value = 0.001;
    o.connect(g); g.connect(bt.audioCtx.destination);
    o.start(bt.audioCtx.currentTime);
    o.stop(bt.audioCtx.currentTime + 0.02);
  } catch(e) {}
  bt.running = true;
  // anchor real-time timestamps so the timer stays accurate even if the
  // browser throttles JS while back grounded — corrects itself on return
  const now = Date.now();
  if (bt.mode === 'stopwatch') {
    bt.startedAt = now - (bt.elapsed || 0) * 1000;
  } else {
    bt.phaseEndsAt = now + (bt.remaining || 0) * 1000;
  }
  requestWakeLock();                                   // keep screen awake
  document.getElementById('timer-modal').classList.add('running');  // fullscreen big number
  document.getElementById('timer-start-btn').innerHTML = ICON_PAUSE;
  updateTimerCloseBtn();
  bt.interval = setInterval(tickBigTimer, 1000);
}

function stopBigTimer() {
  bt.running = false;
  if (bt.interval) clearInterval(bt.interval);
  bt.interval = null;
  hideMiniTimer();
  const lockOv = document.getElementById('timer-lock-overlay');
  if (lockOv) lockOv.classList.remove('active');
  // only release the screen lock if we're NOT in an active workout session
  if (!currentWorkout) releaseWakeLock();
  const modal = document.getElementById('timer-modal');
  if (modal) modal.classList.remove('running','phase-prep','phase-work','phase-rest');
  const btn = document.getElementById('timer-start-btn');
  if (btn) btn.innerHTML = ICON_PLAY;
  updateTimerCloseBtn();
}

function toggleBigTimer() {
  if (bt.running) stopBigTimer();
  else startBigTimer();
}

function resetBigTimer() {
  stopBigTimer();
  if (bt.mode === 'stopwatch') {
    bt.elapsed = 0;
  } else if (bt.mode === 'simple') {
    bt.remaining = bt.simpleTime;
  } else {
    // interval: start with prep phase if enabled
    bt.currentRound = 1;
    if (bt.prep > 0) {
      bt.phase = 'prep';
      bt.remaining = bt.prep;
    } else {
      bt.phase = 'work';
      bt.remaining = bt.work;
    }
  }
  renderBigTimer();
}
