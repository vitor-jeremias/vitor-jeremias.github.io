<title>UNFYN — Still Becoming.</title>
<meta name="description" content="UNFYN — Still Becoming.">
<meta property="og:title" content="UNFYN — Still Becoming.">
<meta property="og:description" content="UNFYN — Still Becoming.">
<meta property="og:type" content="website">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e0c;--surface:#13191600;--surface:#141a17;--surface2:#1c2420;--border:#2a342e;
  --accent:#39FF88;--accent3:#39FF88;--upper:#39FF88;--lower:#2ecc71;
  --orange:#ff9f43;--red:#ff5e57;--yellow:#feca57;
  --text:#f0f4f1;--text2:#9fb3a8;--text3:#6a7d72;
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;--radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden;}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,14,12,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top, 0px));display:flex;align-items:center;gap:12px;}
.nav-title{font-size:18px;font-weight:800;color:var(--text);flex-shrink:0;display:flex;align-items:center;}
.nav-tabs{display:flex;gap:3px;background:var(--surface);border-radius:10px;padding:4px;flex:1;}
.nav-tab{flex:1;padding:9px 6px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:600;border:none;background:none;color:var(--text2);cursor:pointer;transition:all 0.2s;white-space:nowrap;text-align:center;}
.nav-tab.active{background:var(--accent);color:#0a0e0c;}
.view{display:none;padding:20px;padding-bottom:96px;}.view.active{display:block;}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.home-header{padding:8px 4px 20px;}
.home-greeting{font-size:15px;color:var(--text3);font-weight:500;}
.home-quote{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-top:2px;line-height:1.1;}
.home-streak{display:inline-block;margin-top:12px;font-size:13px;font-weight:700;color:var(--accent);background:rgba(57,255,136,0.12);padding:6px 12px;border-radius:50px;font-family:var(--mono);}
.hero-card{background:linear-gradient(145deg,#1a2420,#141a17);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:28px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.hero-card:active{transform:scale(0.98);}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(57,255,136,0.15),transparent 70%);}
.hero-label{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);}
.hero-title{font-size:30px;font-weight:800;color:var(--text);margin-top:8px;letter-spacing:-0.5px;}
.hero-sub{font-size:14px;color:var(--text2);margin-top:4px;}
.hero-meta{font-size:13px;color:var(--text3);margin-top:10px;font-family:var(--mono);}
.hero-btn{display:inline-block;margin-top:20px;background:var(--accent);color:#0a0e0c;font-weight:800;font-size:16px;padding:14px 28px;border-radius:12px;box-shadow:0 4px 14px rgba(57,255,136,0.25);}
.hero-card.cardio{background:linear-gradient(145deg,#1a2420,#141a17);}
.hero-card.rest{background:var(--surface);cursor:default;box-shadow:none;}
.hero-card.rest::before{display:none;}
.complete-hero{text-align:center;padding:32px 16px 28px;}
.complete-check{width:64px;height:64px;margin:0 auto 16px;border-radius:50%;background:var(--accent);color:#0a0e0c;font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(57,255,136,0.3);}
.complete-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.complete-sub{font-size:13px;color:var(--text2);margin-top:6px;font-family:var(--mono);}
.complete-quote{font-size:18px;font-weight:700;color:var(--text2);margin-top:20px;}
.save-btn.one-more{background:transparent;color:var(--accent);border:1px solid var(--accent);margin-top:12px;box-shadow:none;}
.day-card.today{border-color:var(--accent);border-width:2px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.day-card:active{transform:scale(0.97);}
.day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.day-card.upper::before{background:var(--upper);}
.day-card.lower::before{background:var(--lower);}
.day-card.cardio::before{background:var(--orange);}
.day-card.rest::before{background:var(--text3);}
.day-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;font-family:var(--mono);}
.day-name{font-size:20px;font-weight:800;margin-bottom:4px;}
.day-sub{font-size:11px;color:var(--text2);}
.day-badge{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--accent3);}
.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono);}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);font-family:var(--font);font-size:14px;cursor:pointer;margin-bottom:20px;padding:0;}
.session-header{margin-bottom:20px;}
.session-day{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px;}
.session-title{font-size:28px;font-weight:800;letter-spacing:-0.3px;margin-bottom:5px;}
.last-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;}
.last-bar-text{font-size:12px;color:var(--text2);}
.last-bar-text strong{color:var(--text);}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.ex-header{padding:14px 16px 10px;}
.ex-name{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2;}
.ex-meta{font-size:15px;color:var(--text2);font-family:var(--mono);line-height:1.4;}
.ex-suggestion{font-size:16px;font-weight:700;font-family:var(--mono);margin-top:8px;padding:8px 14px;border-radius:8px;display:inline-block;}
.ex-suggestion.up{background:rgba(57,255,136,0.12);color:var(--accent);}
.ex-suggestion.keep{background:rgba(243,156,18,0.1);color:var(--yellow);}
.ex-suggestion.down{background:rgba(231,76,60,0.1);color:var(--red);}
.ex-suggestion.max{background:rgba(120,160,255,0.12);color:#8fb0ff;font-size:14px;line-height:1.35;}
.ex-prev{font-size:15px;color:var(--text2);font-family:var(--mono);margin-top:6px;}
.ex-warmup{font-size:11px;font-family:var(--mono);margin-top:5px;padding:6px 10px;border-radius:8px;background:rgba(230,126,34,0.08);border:1px solid rgba(230,126,34,0.2);color:var(--orange);}
.ex-warmup-title{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;opacity:0.8;}
.ex-warmup-sets{color:var(--text);font-weight:600;font-size:15px;}
.sets-area{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr;gap:10px;align-items:center;position:relative;transition:opacity 0.15s;}
.set-row.done .set-num{color:var(--accent);}
.set-row.done .set-num::after{content:'✓';display:block;font-size:11px;line-height:1;margin-top:1px;}
.set-row.done .set-input{border-color:var(--accent);background:rgba(57,255,136,0.06);}
.set-num{font-size:18px;color:var(--text2);font-family:var(--mono);text-align:center;font-weight:700;}
.set-input-wrap{position:relative;}
.set-input-label{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:14px;color:var(--text3);font-family:var(--mono);pointer-events:none;font-weight:600;}
.set-input{width:100%;background:#232e28;border:1.5px solid #3a4842;border-radius:10px;padding:16px 14px 16px 42px;color:var(--accent);font-family:var(--mono);font-size:22px;font-weight:700;text-align:right;-webkit-appearance:none;transition:all 0.15s;}
.set-input::placeholder{color:var(--text3);font-weight:500;opacity:0.6;}
.set-input:focus{outline:none;border-color:var(--accent);background:#283530;box-shadow:0 0 0 3px rgba(57,255,136,0.12);}
.set-input:not(:placeholder-shown){border-color:#4a5a52;background:#283530;}
.save-btn{width:100%;padding:22px;background:var(--accent);border:none;border-radius:var(--radius);color:#0a0e0c;font-family:var(--font);font-size:20px;font-weight:800;cursor:pointer;margin-top:12px;transition:all 0.2s;}
.save-btn:active{transform:scale(0.98);opacity:0.9;}
.discard-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--red);border-radius:var(--radius);color:var(--red);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:all 0.2s;}
.discard-btn:active{transform:scale(0.98);background:rgba(255,94,87,0.08);}

/* Progression summary */
.prog-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.prog-summary-title{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);}
.prog-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.prog-item:last-child{border-bottom:none;}
.prog-item-name{font-size:13px;font-weight:600;flex:1;}
.prog-item-badge{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;}
.prog-item-badge.up{background:rgba(57,255,136,0.12);color:var(--accent);}
.prog-item-badge.keep{background:rgba(243,156,18,0.1);color:var(--yellow);}
.prog-item-badge.down{background:rgba(231,76,60,0.1);color:var(--red);}
.prog-item-badge.max{background:rgba(120,160,255,0.12);color:#8fb0ff;}

/* History */
.session-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.session-log-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.session-log-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.session-log-date{font-size:12px;color:var(--text2);font-family:var(--mono);}
.session-log-vol{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono);}
.session-log-sets{font-size:11px;color:var(--text3);font-family:var(--mono);}
.session-log-body{padding:0 16px 14px;border-top:1px solid var(--border);display:none;}
.session-log-body.open{display:block;}
.log-ex{padding:8px 0;border-bottom:1px solid var(--border);}
.log-ex:last-child{border-bottom:none;}
.log-ex-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.log-ex-sets{display:flex;flex-wrap:wrap;gap:6px;}
.log-set-pill{font-size:11px;font-family:var(--mono);background:var(--surface2);border-radius:6px;padding:3px 8px;color:var(--text2);}
.delete-btn{margin-top:12px;width:100%;padding:10px;background:none;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.edit-btn{width:100%;padding:10px;background:none;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.edit-btn:active{background:rgba(57,255,136,0.08);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.cmp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.cmp-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);font-weight:600;margin-bottom:8px;}
.cmp-value{font-size:30px;font-weight:800;font-family:var(--mono);color:var(--text);letter-spacing:-1px;line-height:1;}
.cmp-unit{font-size:15px;font-weight:600;color:var(--text3);margin-left:3px;}
.cmp-delta{display:inline-block;font-size:14px;font-weight:700;font-family:var(--mono);margin-top:8px;padding:3px 8px;border-radius:6px;}
.cmp-delta.up{background:rgba(57,255,136,0.12);color:var(--accent);}
.cmp-delta.down{background:rgba(231,76,60,0.1);color:var(--red);}
.cmp-prev{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:6px;}
.trend-icon{font-size:16px;font-weight:700;width:20px;text-align:center;flex-shrink:0;}
.trend-icon.up{color:var(--accent);}
.trend-icon.down{color:var(--red);}
.trend-icon.keep{color:var(--text3);}
.trend-val.keep{color:var(--text3);}
.trend-val.down{color:var(--red);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.stat-card.kpi{position:relative;overflow:hidden;padding-left:20px;}
.stat-card.kpi::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--kpi);}
.stat-value{font-size:30px;font-weight:800;font-family:var(--mono);color:var(--accent);letter-spacing:-1px;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:6px;font-family:var(--mono);font-weight:600;}
.ex-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;margin-bottom:16px;-webkit-appearance:none;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px 16px;min-height:160px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.chart-bars{display:flex;align-items:flex-end;gap:7px;height:130px;}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;flex:1;height:100%;}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:6px;transition:height 0.5s cubic-bezier(0.34,1.3,0.64,1);position:relative;}
.chart-bar.up{background:linear-gradient(180deg,#39FF88 0%,#2ecc71 100%);}
.chart-bar.keep{background:linear-gradient(180deg,#f5b545 0%,#e67e22 100%);}
.chart-bar.neutral{background:linear-gradient(180deg,#39FF88 0%,#2ecc71 100%);}
.chart-bar.current{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--accent);}
.chart-bar-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-align:center;font-weight:600;}
.chart-bar-val{font-size:11px;color:var(--text);font-family:var(--mono);font-weight:700;}
.no-data{text-align:center;color:var(--text3);font-size:13px;padding:30px 0;}
.muscle-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.muscle-row:last-child{border-bottom:none;}
.muscle-name{font-size:14px;font-weight:600;width:90px;flex-shrink:0;color:var(--text);}
.muscle-bar-bg{flex:1;background:var(--surface2);border-radius:5px;height:12px;overflow:hidden;}
.muscle-bar-fill{height:12px;border-radius:5px;background:linear-gradient(90deg,#2ecc71,#39FF88);transition:width 0.5s ease;}
.muscle-vol{font-size:12px;color:var(--text2);font-family:var(--mono);font-weight:600;width:48px;text-align:right;flex-shrink:0;}
.trend-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-name{font-size:12px;font-weight:600;flex:1;}
.trend-val{font-size:13px;font-family:var(--mono);font-weight:700;}
.trend-val.up{color:var(--accent3);}
.trend-val.neutral{color:var(--text2);}
.trend-change{font-size:11px;font-family:var(--mono);color:var(--text3);}

/* Dados */
.dados-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.dados-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.dados-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.dados-desc{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.dados-btn{width:100%;padding:14px;border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.dados-btn.export{background:var(--accent);color:#0a0e0c;}
.dados-btn.import{background:var(--lower);color:var(--bg);}
.dados-btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.dados-stats{display:flex;justify-content:space-around;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:16px;}
.dados-stat{text-align:center;}
.dados-stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.dados-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:2px;}
.dados-tip{background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--orange);line-height:1.5;margin-bottom:14px;}
.dados-tip strong{display:block;margin-bottom:4px;font-size:13px;}
input[type="file"]{display:none;}

/* ===== Nutrição ===== */
.nutri-sub{font-size:13px;color:var(--text3);font-family:var(--mono);}
.nutri-meal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.nutri-meal-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.nutri-meal-name{font-size:18px;font-weight:800;color:var(--text);}
.nutri-meal-time{font-size:13px;font-family:var(--mono);color:var(--accent);font-weight:700;}
.nutri-option{display:flex;flex-direction:column;gap:7px;}
.nutri-item{font-size:14px;line-height:1.4;color:var(--text2);padding-left:14px;position:relative;}
.nutri-item::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0.6;}
.nutri-or{text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text3);letter-spacing:2px;margin:12px 0;position:relative;}
.nutri-or::before,.nutri-or::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.nutri-or::before{left:0;}.nutri-or::after{right:0;}
.nutri-note{margin-top:12px;padding:8px 12px;background:rgba(57,255,136,0.08);border-radius:8px;font-size:12px;color:var(--accent);font-weight:600;line-height:1.4;}
.nutri-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.nutri-fruit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.nutri-fruit{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);}
.nutri-fruit-g{font-family:var(--mono);color:var(--text);font-weight:600;}
.nutri-rules{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.nutri-rules-title{font-size:15px;font-weight:800;color:var(--accent);margin-bottom:12px;}
.nutri-rule{font-size:13px;line-height:1.45;color:var(--text2);padding:7px 0 7px 16px;position:relative;border-bottom:1px solid var(--border);}
.nutri-rule:last-child{border-bottom:none;}
.nutri-rule::before{content:'';position:absolute;left:0;top:14px;width:5px;height:5px;border-radius:50%;background:var(--text3);}
.nutri-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px;}
.nutri-table th{text-align:center;font-size:11px;color:var(--text3);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--border);}
.nutri-table td{text-align:center;padding:7px 8px;color:var(--text2);border-bottom:1px solid var(--border);}
.nutri-table .nutri-tname{text-align:left;color:var(--text);font-weight:600;font-family:var(--font);font-size:13px;white-space:nowrap;}
.nutri-table .nutri-last{color:var(--text);font-weight:700;}
.nutri-table td.down{color:var(--accent);}
.nutri-table td.up{color:var(--orange);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#0a0e0c;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;box-shadow:0 4px 12px rgba(57,255,136,0.3);}

/* ===== Login screen ===== */
.login-glow{position:absolute;left:50%;bottom:-30%;width:140%;height:80%;transform:translateX(-50%);background:radial-gradient(ellipse at center,rgba(57,255,136,0.18),rgba(57,255,136,0.05) 40%,transparent 70%);pointer-events:none;animation:loginGlowPulse 6s ease-in-out infinite;}
@keyframes loginGlowPulse{0%,100%{opacity:0.7;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.08);}}
.login-watermark{position:absolute;top:50%;left:50%;width:118%;max-width:640px;transform:translate(-50%,-54%);opacity:0.035;pointer-events:none;animation:loginFloat 9s ease-in-out infinite;}
.login-watermark svg{width:100%;height:auto;}
@keyframes loginFloat{0%,100%{transform:translate(-50%,-54%);}50%{transform:translate(-50%,-58%);}}
.login-grain{position:absolute;inset:0;pointer-events:none;opacity:0.5;background:radial-gradient(circle at 20% 30%,rgba(57,255,136,0.04),transparent 25%),radial-gradient(circle at 80% 70%,rgba(57,255,136,0.03),transparent 25%);}
.login-field{width:100%;padding:20px 18px;margin-bottom:14px;border:1px solid var(--border);border-radius:14px;font-family:var(--font);font-size:16px;background:rgba(28,36,32,0.6);color:var(--text);-webkit-appearance:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;backdrop-filter:blur(8px);}
.login-field::placeholder{color:var(--text3);}
.login-field:focus{outline:none;border-color:var(--accent);background:rgba(28,36,32,0.9);box-shadow:0 0 0 3px rgba(57,255,136,0.12);}
.login-submit{width:100%;padding:22px;margin-top:6px;background:var(--accent);border:none;border-radius:14px;color:#0a0e0c;font-family:var(--font);font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 28px rgba(57,255,136,0.4);transition:transform 0.15s,box-shadow 0.2s;letter-spacing:1px;text-transform:uppercase;}
.login-submit:active{transform:scale(0.98);box-shadow:0 3px 14px rgba(57,255,136,0.3);}
.login-quote{text-align:center;margin-top:30px;font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);min-height:18px;opacity:0;animation:loginQuoteIn 0.8s ease 0.3s forwards;padding-left:2.5px;}
@keyframes loginQuoteIn{to{opacity:1;}}
.toast.show{transform:translateX(-50%) translateY(0);}
.history-empty{text-align:center;padding:60px 20px;color:var(--text3);}
.rest-btn{width:100%;padding:16px;background:rgba(57,255,136,0.08);border:1.5px solid var(--accent);border-radius:12px;color:var(--accent);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.timer-mini{position:fixed;left:16px;right:16px;bottom:calc(24px + env(safe-area-inset-bottom, 0px));z-index:900;display:none;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;background:var(--accent);color:#0a0e0c;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.35);cursor:pointer;animation:miniUp 0.25s cubic-bezier(0.34,1.4,0.64,1);}
.timer-mini.show{display:flex;}
@keyframes miniUp{from{transform:translateY(120%);}to{transform:translateY(0);}}
.timer-mini-left{display:flex;align-items:center;gap:8px;min-width:0;}
.timer-mini-icon{display:flex;width:15px;height:15px;}
.timer-mini-icon svg{width:15px;height:15px;}
.timer-mini-label{font-family:var(--font);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.timer-mini-time{font-family:var(--mono);font-size:17px;font-weight:800;letter-spacing:0.5px;}
/* Water lock */
.timer-lock-btn{display:none;align-items:center;justify-content:center;gap:7px;margin:18px auto 0;padding:11px 22px;background:transparent;border:1px solid var(--border);border-radius:50px;color:var(--text2);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
.timer-modal.running .timer-lock-btn{display:flex;}
.timer-modal.running.phase-work .timer-lock-btn,
.timer-modal.running.phase-rest .timer-lock-btn,
.timer-modal.running.phase-prep .timer-lock-btn{border-color:rgba(10,14,12,0.25);color:rgba(10,14,12,0.55);}
.timer-lock-overlay{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.28);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.timer-lock-overlay.active{display:flex;}
.timer-lock-hint{display:flex;flex-direction:column;align-items:center;gap:14px;color:rgba(255,255,255,0.92);position:relative;user-select:none;}
.timer-lock-ring{position:relative;width:80px;height:80px;}
.timer-lock-ring svg{width:80px;height:80px;transform:rotate(-90deg);}
.timer-lock-ring .ring-bg{fill:none;stroke:rgba(255,255,255,0.2);stroke-width:5;}
.timer-lock-ring .ring-fill{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-dasharray:214;stroke-dashoffset:214;transition:stroke-dashoffset 0.05s linear;}
.timer-lock-text{font-family:var(--mono);font-size:13px;text-align:center;line-height:1.5;letter-spacing:1px;text-transform:uppercase;}
.rest-btn:active{background:var(--accent);color:#0a0e0c;}
/* Timer FAB + Modal */
#timer-fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(57,255,136,0.4);z-index:500;transition:transform 0.15s;}
#timer-fab:active{transform:scale(0.92);}
.timer-modal{position:fixed;inset:0;background:rgba(10,14,12,0.96);backdrop-filter:blur(12px);z-index:1500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.timer-modal.open{display:flex;}
.timer-modal.running{background:#0a0e0c;transition:background 0.4s ease;}
/* Phase background colors (fullscreen, only while running intervals) */
.timer-modal.running.phase-prep{background:#feca57;}
.timer-modal.running.phase-work{background:#39FF88;}
.timer-modal.running.phase-rest{background:#ff9f43;}
/* On colored phases, text/number go dark for contrast */
.timer-modal.running.phase-prep .timer-display-big,
.timer-modal.running.phase-work .timer-display-big,
.timer-modal.running.phase-rest .timer-display-big{color:#0a0e0c!important;}
.timer-modal.running.mode-interval.phase-work .timer-phase{color:var(--accent)!important;}
.timer-modal.running.mode-interval.phase-rest .timer-phase{color:var(--orange)!important;}
.timer-modal.running.mode-interval.phase-prep .timer-phase{color:var(--yellow)!important;}
.timer-modal.running.phase-prep .timer-close,
.timer-modal.running.phase-work .timer-close,
.timer-modal.running.phase-rest .timer-close{background:rgba(10,14,12,0.15);color:#0a0e0c;}
.timer-modal.running.phase-work .timer-big-btn{background:#0a0e0c;color:#39FF88;}
.timer-modal.running.phase-rest .timer-big-btn,
.timer-modal.running.phase-prep .timer-big-btn{background:#0a0e0c;color:#fff;}
.timer-modal.running.phase-work .timer-reset-btn,
.timer-modal.running.phase-rest .timer-reset-btn,
.timer-modal.running.phase-prep .timer-reset-btn,
.timer-modal.running.phase-work .timer-skip-btn,
.timer-modal.running.phase-rest .timer-skip-btn,
.timer-modal.running.phase-prep .timer-skip-btn{background:rgba(10,14,12,0.2);color:#0a0e0c;border-color:transparent;}
.timer-modal-inner{width:100%;max-width:380px;text-align:center;position:relative;}
.timer-close{position:absolute;top:-8px;right:0;background:var(--surface2);border:none;color:var(--text2);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;}
.timer-mode-switch{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;margin:48px auto 32px;max-width:340px;width:100%;}
.timer-mode-btn{flex:1;padding:11px 4px;border:none;background:none;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.timer-mode-btn.active{background:var(--accent);color:#0a0e0c;}
.timer-display-big{font-family:var(--mono);font-size:88px;font-weight:700;color:var(--accent);letter-spacing:-2px;line-height:1;margin-bottom:8px;transition:font-size 0.2s;white-space:nowrap;}
.timer-display-big.rest{color:var(--orange);}
.timer-display-big.work{color:var(--accent);}
.timer-display-big.prep{color:var(--yellow);}
/* When running: hide config/switch, blow up the number to fill the screen */
.timer-modal.running .timer-mode-switch,
.timer-modal.running .timer-config{display:none!important;}
.timer-modal.running .timer-display-big{font-size:min(24vw,180px);margin-bottom:24px;letter-spacing:0;width:100%;text-align:center;line-height:0.9;}
.timer-modal.running.mode-interval .timer-display-big{font-size:min(56vw,44vh,520px);margin-top:0;margin-bottom:6px;font-weight:800;line-height:0.82;width:100%;text-align:center;overflow:hidden;}
.timer-modal.running .timer-phase{font-size:22px;margin-bottom:6px;letter-spacing:3px;}
.timer-modal.running.mode-interval .timer-phase{order:2;margin-top:14px;margin-bottom:0;font-size:40px;font-weight:800;letter-spacing:4px;text-transform:uppercase;display:block;width:100%;padding:14px 22px;border-radius:16px;background:#0a0e0c;box-shadow:0 6px 20px rgba(0,0,0,0.25);}
.timer-modal.running.mode-interval .timer-next{display:block;font-size:15px;margin-bottom:40px;color:rgba(240,244,241,0.6);}
.timer-modal.running.mode-interval.phase-prep .timer-next,
.timer-modal.running.mode-interval.phase-work .timer-next,
.timer-modal.running.mode-interval.phase-rest .timer-next{color:rgba(10,14,12,0.6)!important;}
.timer-modal.running .timer-controls{max-width:340px;margin:0 auto;}
.timer-phase{font-family:var(--mono);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text2);min-height:24px;margin-bottom:6px;}
.timer-next{display:none;font-family:var(--mono);font-size:13px;color:var(--text3);letter-spacing:1px;margin-bottom:28px;min-height:16px;}
.timer-total{display:none;font-family:var(--mono);font-size:40px;font-weight:700;color:var(--accent);text-align:center;letter-spacing:1px;margin-bottom:24px;}
.timer-modal.running.mode-interval .timer-total{display:block;}
.timer-modal.running.mode-interval.phase-prep .timer-total,
.timer-modal.running.mode-interval.phase-work .timer-total,
.timer-modal.running.mode-interval.phase-rest .timer-total{color:rgba(10,14,12,0.65)!important;}
.timer-modal.running.mode-interval{justify-content:flex-start;padding-top:calc(14px + env(safe-area-inset-top, 0px));}
.timer-modal.running.mode-interval .timer-modal-inner{display:flex;flex-direction:column;align-items:center;max-width:none;width:100%;min-height:100%;flex:1;}
.timer-modal.running.mode-interval .timer-total{order:1;}
.timer-modal.running.mode-interval .timer-display-big{order:3;margin-top:auto;}
.timer-modal.running.mode-interval .timer-next{order:4;margin-bottom:auto;}
.timer-modal.running.mode-interval .timer-controls{order:5;}
.timer-modal.running.mode-interval #timer-skip-row{order:6;}
.timer-modal.running.mode-interval .timer-lock-btn{order:7;margin-bottom:calc(8px + env(safe-area-inset-bottom, 0px));}
.timer-modal.running.mode-interval .timer-total{font-size:34px;margin-bottom:0;}
#timer-skip-row{display:none;gap:10px;margin-top:14px;max-width:340px;margin-left:auto;margin-right:auto;}
.timer-modal.running.mode-interval #timer-skip-row{display:flex;}
.timer-skip-btn{flex:1;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.timer-skip-btn svg{display:block;}
.timer-skip-btn:active{opacity:0.8;}
.timer-config{margin-bottom:28px;}
.timer-presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.timer-presets button{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;font-weight:700;padding:12px 18px;border-radius:10px;cursor:pointer;transition:all 0.15s;}
.timer-presets button:active{background:var(--accent);color:#0a0e0c;}
.timer-int-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-radius:12px;margin-bottom:10px;}
.timer-int-row>span{font-size:17px;font-weight:600;color:var(--text);}
.timer-stepper{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:19px;font-weight:700;color:var(--accent);}
.timer-stepper .timer-step-val{min-width:64px;text-align:center;display:inline-block;}
.timer-stepper button{width:44px;height:44px;border-radius:10px;border:none;background:var(--surface2);color:var(--text);font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.timer-stepper button:active{background:var(--accent);color:#0a0e0c;}
.timer-int-presets{display:flex;gap:8px;justify-content:center;margin-top:16px;}
.timer-int-presets button{flex:1;background:rgba(57,255,136,0.1);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:13px;font-weight:700;padding:10px;border-radius:10px;cursor:pointer;}
.timer-controls{display:flex;gap:12px;align-items:center;}
.timer-big-btn{flex:1;padding:18px;background:var(--accent);border:none;border-radius:14px;color:#0a0e0c;font-family:var(--font);font-size:19px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.timer-big-btn svg{display:block;}
.timer-reset-btn{width:60px;padding:20px 0;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:22px;cursor:pointer;}
</style>
</head>

<script>
// ======================== WORKOUT DATA ========================
const INCREMENTS = {
  machine: 5,
  dumbbell: 2.5,
  barbell: 5,
  barbell_10: 10,
  cable: 5,
  cable_fly: 5,
  bodyweight: 2.5
};

// ======================== PROGRESSION LOGIC ========================
function analyzeProgression(ex, lastExData) {
  if (!lastExData) return null;
  const validSets = lastExData.sets.filter(s => s.weight > 0 && s.reps > 0);
  if (!validSets.length) return null;

  const weight = validSets[0].weight;
  const allReps = validSets.map(s => s.reps);
  const minReps = Math.min(...allReps);
  const allReachedMax = allReps.every(r => r >= ex.repsMax);
  const anyBelowMin = allReps.some(r => r < ex.repsMin);

  // Cable Chest Fly uses a fixed stack (9-14-18-23...)
  if (ex.inc === 'cable_fly') {
    const idx = CABLE_FLY_STACK.indexOf(weight);
    if (anyBelowMin && idx > 0) {
      const nw = CABLE_FLY_STACK[idx-1];
      return { status: 'down', label: `↓ Reduz → ${nw}kg`, weight: nw };
    } else if (allReachedMax && idx >= 0 && idx < CABLE_FLY_STACK.length-1) {
      const nw = CABLE_FLY_STACK[idx+1];
      return { status: 'up', label: `↑ Aumenta → ${nw}kg`, weight: nw };
    } else {
      return { status: 'keep', label: `→ Mantém ${weight}kg`, weight: weight };
    }
  }

  const increment = INCREMENTS[ex.inc] || 2.5;

  if (anyBelowMin) {
    const newWeight = Math.max(0, weight - increment);
    return { status: 'down', label: `↓ Reduz → ${newWeight}kg`, weight: newWeight };
  } else if (allReachedMax) {
    const newWeight = weight + increment;
    // Machine has a weight ceiling and we'd exceed it → can't add load.
    // Tell the user to progress via reps / tempo / intensity instead.
    if (ex.maxWeight && newWeight > ex.maxWeight) {
      return { status: 'max', label: `▲ Máquina no máximo (${ex.maxWeight}kg) — sobe reps ou intensidade`, weight: ex.maxWeight };
    }
    return { status: 'up', label: `↑ Aumenta → ${newWeight}kg`, weight: newWeight };
  } else {
    return { status: 'keep', label: `→ Mantém ${weight}kg`, weight: weight };
  }
}

function getSuggestedWeight(ex, workoutKey) {
  const lastEx = getLastExData(workoutKey, ex.id);
  if (!lastEx) return null;
  const prog = analyzeProgression(ex, lastEx);
  return prog ? prog.weight : null;
}

function calcWarmup(ex, workoutKey) {
  const workWeight = getSuggestedWeight(ex, workoutKey);
  if (!workWeight || workWeight <= 0) return null;
  const isBarbell = (ex.inc === 'barbell' || ex.inc === 'barbell_10');
  // Barbell: smallest plate is 5kg => 10kg total per change, so warmups must be multiples of 10.
  // Machines/cables: round to 5. Everything else: 2.5.
  const step = isBarbell ? 10 : (ex.inc === 'machine' || ex.inc === 'cable') ? 5 : 2.5;
  const round = (v) => Math.round(v / step) * step;
  let w50 = round(workWeight * 0.5);
  let w75 = round(workWeight * 0.75);
  // Squat: empty bar first, then warmup sets
  if (ex.id === 'bs') {
    if (w50 < 20) w50 = 20;
    if (w75 < 20) w75 = 20;
    return { text: `barra vazia × 10  →  ${w50}kg × 8  →  ${w75}kg × 4`, work: workWeight };
  }
  // Barbell exercises with a real bar (squat, rdl): don't suggest below empty bar (20kg)
  if (isBarbell && (ex.id === 'rdl')) {
    if (w50 < 20) w50 = 20;
    if (w75 < 20) w75 = 20;
  }
  return { text: `${w50}kg × 10  →  ${w75}kg × 6`, work: workWeight };
}

function calcDayStreak(sessions) {
  if (!sessions.length) return 0;
  // Unique training days (YYYY-MM-DD)
  const days = new Set(sessions.map(s => {
    const d = new Date(s.date);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }));
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  // Allow streak to count if trained today or yesterday (so it doesn't break mid-day)
  let cursor = new Date(today);
  const key = d => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  if (!days.has(key(cursor))) {
    cursor.setDate(cursor.getDate()-1);
    if (!days.has(key(cursor))) return 0;
  }
  while (days.has(key(cursor))) {
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

// Tracks which exercises have already auto-triggered rest (so it fires only once per exercise per session)
let _autoRestFired = {};
let _autoRestTimeout = null;

// Called on every input in a set row: saves draft, marks the row done, and
// auto-starts the rest countdown after each set EXCEPT the last (no rest needed
// after the final set — you move to the next exercise).
function onSetInput(exId, setNum) {
  saveDraft();
  const row = document.getElementById(`row_${exId}_${setNum}`);
  if (!row) return;
  const wEl = document.getElementById(`w_${exId}_${setNum}`);
  const rEl = document.getElementById(`r_${exId}_${setNum}`);
  const wv = parseFloat(wEl?.value);
  const rv = parseInt(rEl?.value, 10);

  // a set counts as done once it has valid REPS (weight may be pre-filled, so reps is the real signal)
  const filled = isFinite(rv) && rv > 0;
  row.classList.toggle('done', filled);

  // Auto-rest after completing a set that is NOT the last one.
  // Debounced: waits ~1.2s after you stop typing, so writing "10" (1 then 0)
  // doesn't fire the rest on the first digit. Only fires if no timer is running.
  if (filled && row.dataset.last !== '1') {
    const fireKey = exId + '_' + setNum;
    const w = WORKOUTS[currentWorkout];
    const ex = w && w.exercises.find(e => e.id === exId);
    if (ex && ex.rest && !_autoRestFired[fireKey] && !bt.running) {
      const rs = parseRestSeconds(ex.rest);
      if (rs > 0) {
        if (_autoRestTimeout) clearTimeout(_autoRestTimeout);
        _autoRestTimeout = setTimeout(() => {
          // re-check: still valid reps, still not already running
          const rNow = parseInt(document.getElementById(`r_${exId}_${setNum}`)?.value, 10);
          if (isFinite(rNow) && rNow > 0 && !_autoRestFired[fireKey] && !bt.running) {
            _autoRestFired[fireKey] = true;
            const wE = document.getElementById(`w_${exId}_${setNum}`);
            const rE = document.getElementById(`r_${exId}_${setNum}`);
            if (wE) wE.blur();
            if (rE) rE.blur();
            startRest(rs);
          }
        }, 1200);
      }
    } else if (filled) {
      // mark as "handled" so it won't retro-trigger later when the timer stops
      _autoRestFired[fireKey] = true;
    }
  }
}

function saveDraft() {
  if (!currentWorkout) return;
  const w = WORKOUTS[currentWorkout];
  const draft = {};
  w.exercises.forEach(ex => {
    for (let i = 1; i <= ex.sets; i++) {
      const wv = document.getElementById(`w_${ex.id}_${i}`)?.value;
      const rv = document.getElementById(`r_${ex.id}_${i}`)?.value;
      if (wv) draft[`w_${ex.id}_${i}`] = wv;
      if (rv) draft[`r_${ex.id}_${i}`] = rv;
    }
  });
  try {
    if (Object.keys(draft).length) localStorage.setItem(draftKey(), JSON.stringify(draft));
    else localStorage.removeItem(draftKey());
  } catch(e) {}
}

function loadDraft() {
  if (!currentWorkout) return;
  try {
    const raw = localStorage.getItem(draftKey());
    if (!raw) return;
    const draft = JSON.parse(raw);
    let restored = false;
    Object.keys(draft).forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = draft[id]; restored = true; }
    });
    // re-mark completed rows + prevent auto-rest from firing for already-filled sets
    const w = WORKOUTS[currentWorkout];
    if (w) w.exercises.forEach(ex => {
      for (let i = 1; i <= ex.sets; i++) {
        const rEl = document.getElementById(`r_${ex.id}_${i}`);
        const row = document.getElementById(`row_${ex.id}_${i}`);
        if (!row || !rEl) continue;
        const rv = parseInt(rEl.value, 10);
        const filled = isFinite(rv) && rv > 0;
        row.classList.toggle('done', filled);
        if (filled && row.dataset.last !== '1') _autoRestFired[ex.id + '_' + i] = true;
      }
    });
    if (restored) showToast('Rascunho recuperado');
  } catch(e) {}
}

function discardWorkout() {
  if (!confirm('Descartar este treino? Os dados que registaste não serão guardados.')) return;
  // clear rest/timeout, draft, timer state
  if (_autoRestTimeout) { clearTimeout(_autoRestTimeout); _autoRestTimeout = null; }
  _autoRestFired = {};
  clearDraft();
  resetTimer();
  clearTimerState();
  stopBigTimer();
  hideMiniTimer();
  currentWorkout = null;
  releaseWakeLock();
  renderHome();
  showToast('Treino descartado');
}

async function saveSession() {
  const w = WORKOUTS[currentWorkout];
  let anyFilled = false;
  const exData = w.exercises.map(ex => {
    const sets = [];
    for (let i = 1; i <= ex.sets; i++) {
      let weight = parseFloat(document.getElementById(`w_${ex.id}_${i}`)?.value);
      let reps = parseInt(document.getElementById(`r_${ex.id}_${i}`)?.value, 10);
      // sanitize: discard NaN / negatives / implausible values so lixo never enters the data
      weight = (!isFinite(weight) || weight < 0) ? 0 : Math.min(weight, 1000);
      reps = (!isFinite(reps) || reps < 0) ? 0 : Math.min(reps, 500);
      // a set only counts if it has reps actually performed; otherwise store as empty
      // (weight is pre-filled with the suggestion, so reps is the real "did it" signal)
      if (reps > 0) { anyFilled = true; sets.push({weight, reps}); }
      else { sets.push({weight: 0, reps: 0}); }
    }
    return {id:ex.id, name:ex.name, sets};
  });

  if (!anyFilled) { showToast('Preenche pelo menos uma série!'); return; }

  const session = {id:Date.now(), workoutKey:currentWorkout, date:new Date().toISOString(), exercises:exData, duration:getTimerSeconds()};

  // SAFETY NET: store the session locally BEFORE anything else, so it can never be lost
  addPending(session);

  showToast('A guardar...');
  const ok = await sb.saveSession(session);

  if (ok) {
    // saved to cloud — remove from pending and refresh
    removePending(session.id);
    _sessions = await sb.getSessions();
    resetTimer();
    clearDraft();
    clearTimerState();
    showProgressionSummary(exData, w);
  } else {
    // cloud save failed — keep it local, don't lose anything
    resetTimer();
    clearDraft();
    clearTimerState();
    // add to in-memory list so it shows immediately
    _sessions = [...(_sessions||[]), session].sort((a,b)=>new Date(a.date)-new Date(b.date));
    showToast('Guardado no telemóvel (sincroniza depois)');
    showProgressionSummary(exData, w);
  }
}

// ===== Pending (local) sessions — safety net against lost data =====
function getPending() {
  try { return JSON.parse(localStorage.getItem('vt_pending') || '[]'); } catch(e) { return []; }
}
function addPending(session) {
  try {
    const p = getPending();
    if (!p.find(s => s.id === session.id)) { p.push(session); localStorage.setItem('vt_pending', JSON.stringify(p)); }
  } catch(e) {}
}
function removePending(id) {
  try {
    const p = getPending().filter(s => s.id !== id);
    localStorage.setItem('vt_pending', JSON.stringify(p));
  } catch(e) {}
}
// Try to upload any pending sessions (called on app start and after login)
async function syncPending() {
  const p = getPending();
  if (!p.length) return;
  let synced = 0;
  for (const session of p) {
    const ok = await sb.saveSession(session);
    if (ok) { removePending(session.id); synced++; }
  }
  if (synced > 0) { showToast(`${synced} treino(s) sincronizado(s) ✓`); _sessions = await sb.getSessions(); }
}

async function saveEditedSession(id) {
  const s = getSessions().find(x => x.id === id);
  if (!s) return;
  // read edited values back into the exercises structure
  const newExercises = s.exercises.map((ex, exIdx) => {
    const newSets = ex.sets.map((st, setIdx) => {
      const wEl = document.getElementById(`ew_${exIdx}_${setIdx}`);
      const rEl = document.getElementById(`er_${exIdx}_${setIdx}`);
      if (!wEl || !rEl) return st; // set wasn't shown (was empty) — keep as is
      let weight = parseFloat(wEl.value);
      let reps = parseInt(rEl.value, 10);
      weight = (!isFinite(weight) || weight < 0) ? 0 : Math.min(weight, 1000);
      reps = (!isFinite(reps) || reps < 0) ? 0 : Math.min(reps, 500);

// ======================== STATS ========================
function calcWeekComparison(sessions) {
  const now = new Date();
  const dayMs = 24*60*60*1000;
  const thisWeekStart = new Date(now - 7*dayMs);
  const lastWeekStart = new Date(now - 14*dayMs);
  let thisVol=0, lastVol=0, thisCount=0, lastCount=0;
  sessions.forEach(s => {
    const d = new Date(s.date);
    const v = calcVolume(s);
    if (d >= thisWeekStart) { thisVol+=v; thisCount++; }
    else if (d >= lastWeekStart) { lastVol+=v; lastCount++; }
  });
  return { thisVol, lastVol, thisCount, lastCount };
}

function calcExerciseTrends(sessions, allEx) {
  const trends = [];
  allEx.forEach(ex => {
    const points = [];
    sessions.forEach(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return;
      const valid = se.sets.filter(st=>st.weight>0&&st.reps>0);
      if (!valid.length) return;
      const topWeight = Math.max(...valid.map(st=>st.weight));
      points.push({date:new Date(s.date), weight:topWeight});
    });
    if (points.length < 2) return; // need 2+ to show trend
    points.sort((a,b)=>a.date-b.date);
    const recent = points.slice(-3); // last 3 sessions
    const first = recent[0].weight;
    const last = recent[recent.length-1].weight;
    let status, label;
    if (last > first) { status='up'; label='A subir'; }
    else if (last < first) { status='down'; label='A descer'; }
    else { status='keep'; label='Estagnado'; }
    trends.push({ name: ex.name, status, label, current: last, sessions: points.length });
  });
  // Sort: up first, then stagnant, then down
  const order = {up:0, keep:1, down:2};
  return trends.sort((a,b)=>order[a.status]-order[b.status]);
}

function renderStats() {
  const container = document.getElementById('view-stats');
  const sessions = getSessions();
  const totalVol = sessions.reduce((a,s)=>a+calcVolume(s),0);
  const totalSets = sessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.filter(st=>st.weight>0).length,0),0);
  const totalSessions = sessions.length;
  const avgVol = totalSessions > 0 ? Math.round(totalVol/totalSessions) : 0;
  const durSessions = sessions.filter(s=>s.duration>0);
  const avgDuration = durSessions.length > 0 ? Math.round(durSessions.reduce((a,s)=>a+s.duration,0)/durSessions.length) : 0;

  // Streak
  const streak = calcStreak(sessions);

  // Muscle volume
  const muscleVol = {};
  sessions.forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    s.exercises.forEach(se => {
      const def = w.exercises.find(e=>e.id===se.id); if(!def) return;
      se.sets.forEach(st => {
        if(st.weight>0&&st.reps>0) def.muscles.forEach(m=>{muscleVol[m]=(muscleVol[m]||0)+st.weight*st.reps;});
      });
    });
  });
  const maxMV = Math.max(...Object.values(muscleVol), 1);

  // All exercises for chart
  const allEx = [];
  // Count name occurrences to detect duplicates
  const nameCounts = {};
  Object.values(WORKOUTS).forEach(w=>w.exercises.forEach(ex=>{ nameCounts[ex.name]=(nameCounts[ex.name]||0)+1; }));
  Object.keys(WORKOUTS).forEach(wk => {
    const w = WORKOUTS[wk];
    w.exercises.forEach(ex => {
      if(!allEx.find(e=>e.id===ex.id)) {
        const label = nameCounts[ex.name] > 1 ? `${ex.name} (${w.name})` : ex.name;
        allEx.push({id:ex.id, name:label, workoutKey:wk});
      }
    });
  });

  let html = `<p class="section-title">Resumo Geral</p>
  <div class="stats-grid">
    <div class="stat-card kpi" style="--kpi:#39FF88"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sessões</div></div>
    <div class="stat-card kpi" style="--kpi:#39FF88"><div class="stat-value" style="color:#39FF88">${totalVol >= 1000 ? Math.round(totalVol/1000*10)/10+'k' : Math.round(totalVol)}</div><div class="stat-label">Volume kg</div></div>
    <div class="stat-card kpi" style="--kpi:#ff9f43"><div class="stat-value" style="color:#ff9f43">${totalSets}</div><div class="stat-label">Séries Total</div></div>
    ${avgDuration > 0
      ? `<div class="stat-card kpi" style="--kpi:#feca57"><div class="stat-value" style="color:#feca57">${formatTimer(avgDuration)}</div><div class="stat-label">Tempo médio</div></div>`
      : `<div class="stat-card kpi" style="--kpi:#feca57"><div class="stat-value" style="color:#feca57">${avgVol}</div><div class="stat-label">kg / Sessão</div></div>`}
  </div>`;

  // Streak
  if (streak > 0) {
    html += `<div class="stat-card" style="margin-bottom:24px">
      <div class="stat-value" style="color:var(--accent)">${streak}</div>
      <div class="stat-label">Semana${streak>1?'s':''} consecutiva${streak>1?'s':''} a treinar</div>
    </div>`;
  }

  // Week comparison
  const cmp = calcWeekComparison(sessions);
  if (cmp.thisCount > 0 || cmp.lastCount > 0) {
    const volDiff = cmp.thisVol - cmp.lastVol;
    const volPct = cmp.lastVol > 0 ? Math.round((volDiff/cmp.lastVol)*100) : null;
    const volUp = volDiff >= 0;
    const fmtV = (v)=> v>=1000 ? Math.round(v/1000*10)/10+'k' : Math.round(v);
    html += `<p class="section-title">Esta Semana vs Anterior</p>
    <div class="cmp-grid">
      <div class="cmp-card">
        <div class="cmp-label">Volume</div>
        <div class="cmp-value">${fmtV(cmp.thisVol)}<span class="cmp-unit">kg</span></div>
        <div class="cmp-delta ${volUp?'up':'down'}">${volUp?'▲':'▼'} ${volPct!==null?Math.abs(volPct)+'%':fmtV(Math.abs(volDiff))+'kg'}</div>
        <div class="cmp-prev">anterior: ${fmtV(cmp.lastVol)}kg</div>
      </div>
      <div class="cmp-card">
        <div class="cmp-label">Treinos</div>
        <div class="cmp-value">${cmp.thisCount}</div>
        <div class="cmp-delta ${cmp.thisCount>=cmp.lastCount?'up':'down'}">${cmp.thisCount>=cmp.lastCount?'▲':'▼'} ${Math.abs(cmp.thisCount-cmp.lastCount)}</div>
        <div class="cmp-prev">anterior: ${cmp.lastCount}</div>
      </div>
    </div>`;
  }

  // Weekly volume chart (last 8 weeks) — only with 2+ weeks
  const weekly = calcWeeklyVolume(sessions);
  if (weekly.length >= 2) {
    const maxWV = Math.max(...weekly.map(w=>w.vol), 1);
    html += `<p class="section-title">Volume Semanal (kg)</p><div class="chart-wrap"><div class="chart-bars">`;
    const weeklyShown = weekly.slice(-8);
    weeklyShown.forEach((wk,i) => {
      const h = Math.max(6, Math.round((wk.vol/maxWV)*110));
      const vLabel = wk.vol >= 1000 ? `${Math.round(wk.vol/1000*10)/10}k` : `${Math.round(wk.vol)}`;
      const isCurrent = i === weeklyShown.length-1;
      html += `<div class="chart-bar-wrap">
        <div class="chart-bar-val">${vLabel}</div>
        <div class="chart-bar neutral${isCurrent?' current':''}" style="height:${h}px"></div>
        <div class="chart-bar-label">${wk.label}</div>
      </div>`;
    });
    html += `</div></div>`;

    const maxFreq = Math.max(...weekly.map(w=>w.count), 1);
    html += `<p class="section-title">Frequência (sessões/semana)</p><div class="chart-wrap"><div class="chart-bars">`;
    weekly.slice(-8).forEach(wk => {
      const h = Math.max(6, Math.round((wk.count/maxFreq)*110));
      const cls = wk.count >= 4 ? 'up' : wk.count >= 2 ? 'keep' : 'neutral';
      html += `<div class="chart-bar-wrap">
        <div class="chart-bar-val">${wk.count}</div>
        <div class="chart-bar ${cls}" style="height:${h}px"></div>
        <div class="chart-bar-label">${wk.label}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else if (weekly.length === 1) {
    html += `<div class="stat-card" style="margin-bottom:24px;text-align:center;color:var(--text3);font-size:13px;padding:24px">Treina mais uma semana para veres os gráficos de tendência de volume e frequência.</div>`;
  }

  // Progression chart
  html += `<p class="section-title">Progressão de Carga</p>
  <select class="ex-select" id="ex-select" onchange="updateChart()">`;
  allEx.forEach(ex => { html += `<option value="${ex.id}">${ex.name}</option>`; });
  html += `</select><div class="chart-wrap" id="chart-wrap"></div>`;

  // Exercise trends
  const trends = calcExerciseTrends(sessions, allEx);
  if (trends.length) {
    html += `<p class="section-title">Tendência por Exercício</p><div class="stat-card" style="margin-bottom:24px;padding:8px 0">`;
    trends.forEach((t,i) => {
      const icon = t.status==='up' ? '▲' : t.status==='down' ? '▼' : '—';
      html += `<div class="trend-row" style="padding:12px 16px">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span class="trend-icon ${t.status}">${icon}</span>
          <span class="trend-name">${t.name}</span>
        </div>
        <div style="text-align:right">
          <div class="trend-val ${t.status}">${t.label}</div>
          <div class="trend-change">${t.current}kg atual</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Top progressions
  html += `<p class="section-title">Maiores Progressões</p><div class="stat-card" style="margin-bottom:24px">`;
  const progressions = calcTopProgressions(sessions, allEx);
  if (progressions.length) {
    progressions.slice(0,5).forEach(p => {
      html += `<div class="trend-row">
        <div class="trend-name">${p.name}</div>
        <div style="text-align:right">
          <div class="trend-val up">+${p.gain}kg</div>
          <div class="trend-change">${p.from}kg → ${p.to}kg</div>
        </div>
      </div>`;
    });
  } else {
    html += `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Ainda sem dados suficientes</div>`;
  }
  html += `</div>`;

  // Personal Records (PRs)
  html += `<p class="section-title">Recordes Pessoais</p><div class="stat-card" style="margin-bottom:24px">`;
  const prs = calcPRs(sessions, allEx);
  if (prs.length) {
    prs.forEach(pr => {
      html += `<div class="trend-row">
        <div class="trend-name">${pr.name}</div>
        <div style="text-align:right">
          <div class="trend-val up">${pr.weight}kg</div>
          <div class="trend-change">${pr.reps} reps</div>
        </div>
      </div>`;
    });
  } else {
    html += `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Ainda sem recordes registados</div>`;
  }
  html += `</div>`;

  // Muscle volume
  html += `<p class="section-title">Volume por Músculo</p><div class="stat-card" style="margin-bottom:24px">`;
  Object.entries(MUSCLES).forEach(([key,label]) => {
    const vol = muscleVol[key]||0;
    const pct = Math.round((vol/maxMV)*100);
    const volLabel = vol >= 1000 ? `${Math.round(vol/1000*10)/10}k` : `${Math.round(vol)}`;
    html += `<div class="muscle-row">
      <div class="muscle-name">${label}</div>
      <div class="muscle-bar-bg"><div class="muscle-bar-fill" style="width:${pct}%"></div></div>
      <div class="muscle-vol">${volLabel}</div>
    </div>`;
  });
  html += `</div>`;

  container.innerHTML = html;
  updateChart();
}

function updateChart() {
  const exId = document.getElementById('ex-select')?.value; if(!exId) return;
  const points = [];
  getSessions().forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    const se = s.exercises.find(e=>e.id===exId); if(!se) return;
    const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return;
    const maxW = Math.max(...valid.map(st=>st.weight));
    points.push({date:formatDateShort(s.date), weight:maxW});
  });

  const wrap = document.getElementById('chart-wrap'); if(!wrap) return;
  if (!points.length) { wrap.innerHTML=`<div class="no-data">Ainda não há dados para este exercício.</div>`; return; }

  const maxW = Math.max(...points.map(p=>p.weight));
  const recent = points.slice(-10);

  let html = `<div class="chart-bars">`;
  recent.forEach((p,i) => {
    const h = Math.max(4, Math.round((p.weight/maxW)*90));
    const prev = i>0?recent[i-1].weight:p.weight;
    const cls = p.weight>prev?'up':p.weight<prev?'keep':'neutral';
    html += `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${p.weight}</div>
      <div class="chart-bar ${cls}" style="height:${h}px"></div>
      <div class="chart-bar-label">${p.date}</div>
    </div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function calcWeeklyVolume(sessions) {
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    // ISO week key (year-week)
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    const weekNum = Math.floor((d - startOfYear) / (7*24*60*60*1000));
    const key = `${d.getFullYear()}-${weekNum}`;
    if (!weeks[key]) weeks[key] = { vol: 0, count: 0, date: d };
    weeks[key].vol += calcVolume(s);
    weeks[key].count += 1;
  });
  return Object.values(weeks)
    .sort((a,b)=>a.date-b.date)
    .map(w => ({ vol: w.vol, count: w.count, label: `${w.date.getDate()}/${w.date.getMonth()+1}` }));
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const weeks = new Set(sessions.map(s => {
    const d = new Date(s.date);
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    return Math.floor((d - startOfYear) / (7*24*60*60*1000));
  }));
  const weeksArr = [...weeks].sort((a,b)=>b-a);
  let streak = 0;
  const currentWeek = weeksArr[0];
  for (let i=0; i<weeksArr.length; i++) {
    if (weeksArr[i] === currentWeek - i) streak++;
    else break;
  }
  return streak;
}

function calcPRs(sessions, allEx) {
  const prs = [];
  allEx.forEach(ex => {
    let best = null;
    sessions.forEach(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return;
      se.sets.forEach(st => {
        if (st.weight > 0 && st.reps > 0) {
          if (!best || st.weight > best.weight || (st.weight === best.weight && st.reps > best.reps)) {
            best = { weight: st.weight, reps: st.reps };
          }
        }
      });
    });
    if (best) prs.push({ name: ex.name, weight: best.weight, reps: best.reps });
  });
  return prs.sort((a,b)=>b.weight-a.weight);
}

function calcTopProgressions(sessions, allEx) {
  const progressions = [];
  allEx.forEach(ex => {
    const exSessions = sessions.filter(s => {
      const w = WORKOUTS[s.workoutKey]; if(!w) return false;
      return s.exercises.some(e=>e.id===ex.id);
    });
    if (exSessions.length < 2) return;
    const weights = exSessions.map(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return 0;
      const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return 0;
      return Math.max(...valid.map(st=>st.weight));
    }).filter(w=>w>0);
    if (weights.length < 2) return;
    const gain = weights[weights.length-1] - weights[0];
    if (gain > 0) progressions.push({name:ex.name, gain, from:weights[0], to:weights[weights.length-1]});
  });
  return progressions.sort((a,b)=>b.gain-a.gain);
}

function exportData() {
  const sessions = getSessions();
  if (!sessions.length) { showToast('Sem dados para exportar'); return; }
  const data = {version:1, exportDate:new Date().toISOString(), sessionCount:sessions.length, sessions};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const fname = `treino_backup_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const a = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado ✓');
}

function importData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions||!Array.isArray(data.sessions)) throw new Error('Formato inválido');
      const current = getSessions();
      const choice = current.length > 0 ?
        confirm(`Tens ${current.length} sessões. Substituir pelos dados do backup (${data.sessions.length} sessões)?\n\nOK = Substituir\nCancelar = Combinar`) : true;
      if (choice) {
        saveSessions(data.sessions);
        showToast(`${data.sessions.length} sessões importadas ✓`);
      } else {
        const existingIds = new Set(current.map(s=>s.id));
        const newOnes = data.sessions.filter(s=>!existingIds.has(s.id));
        const combined = [...current,...newOnes].sort((a,b)=>new Date(a.date)-new Date(b.date));
        saveSessions(combined);
        showToast(`${newOnes.length} novas sessões combinadas ✓`);
      }
      setTimeout(()=>renderDados(), 500);
    } catch(err) { alert('Ficheiro inválido.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function clearAllData() {
  if (!confirm('Tens a certeza? Esta ação não pode ser desfeita.\nFizeste backup?')) return;
  if (!confirm('Última confirmação — apagar mesmo tudo?')) return;
  const sessions = getSessions();
  for (const s of sessions) { await sb.deleteSession(s.id); }
  _sessions = [];
  showToast('Todos os dados apagados');
  setTimeout(()=>renderDados(), 500);
}

function showLogin(errorMsg) {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-wrap').style.display = 'none';
  document.getElementById('login-error').textContent = errorMsg || '';
  document.getElementById('login-password').value = '';
  const q = document.getElementById('login-quote');
  if (q) q.textContent = LOGIN_QUOTES[Math.floor(Math.random() * LOGIN_QUOTES.length)];
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  if (!email || !password) { errEl.textContent = 'Preenche email e senha'; return; }
  btn.textContent = 'A entrar...'; btn.disabled = true;
  const result = await login(email, password);
  btn.textContent = 'Entrar'; btn.disabled = false;
  if (result.ok) {
    errEl.textContent = '';
    showApp();
    await startApp();
  } else {
    errEl.textContent = result.error;
  }
}

async function logout() {
  if (!confirm('Terminar sessão?')) return;
  clearAuth();
  _sessions = null;
