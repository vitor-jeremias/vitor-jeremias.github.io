<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>V. Treino</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;
  --accent:#7c6dfa;--accent3:#6dfabc;--upper:#7c6dfa;--lower:#3fcf8e;
  --orange:#ff8c42;--red:#ff4466;--yellow:#ffd166;
  --text:#e8e8f0;--text2:#8888a8;--text3:#55556a;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;--radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden;}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-size:18px;font-weight:800;}.nav-title span{color:var(--accent);}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;}
.nav-tab{padding:6px 12px;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:600;border:none;background:none;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.nav-tab.active{background:var(--accent);color:#fff;}
.view{display:none;padding:20px;padding-bottom:48px;}.view.active{display:block;}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.day-card:active{transform:scale(0.97);}
.day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.day-card.upper::before{background:var(--upper);}
.day-card.lower::before{background:var(--lower);}
.day-card.cardio::before{background:var(--orange);}
.day-card.rest::before{background:var(--text3);}
.day-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;font-family:var(--mono);}
.day-name{font-size:16px;font-weight:800;margin-bottom:3px;}
.day-sub{font-size:11px;color:var(--text2);}
.day-badge{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--accent3);}
.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono);}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);font-family:var(--font);font-size:14px;cursor:pointer;margin-bottom:20px;padding:0;}
.session-header{margin-bottom:20px;}
.session-day{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px;}
.session-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
.last-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;}
.last-bar-text{font-size:12px;color:var(--text2);}
.last-bar-text strong{color:var(--text);}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.ex-header{padding:14px 16px 10px;}
.ex-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.ex-meta{font-size:12px;color:var(--text2);font-family:var(--mono);}
.ex-suggestion{font-size:12px;font-family:var(--mono);margin-top:4px;padding:4px 8px;border-radius:6px;display:inline-block;}
.ex-suggestion.up{background:rgba(109,250,188,0.1);color:var(--accent3);}
.ex-suggestion.keep{background:rgba(255,209,102,0.1);color:var(--yellow);}
.ex-suggestion.down{background:rgba(255,68,102,0.1);color:var(--red);}
.ex-prev{font-size:11px;color:var(--accent);font-family:var(--mono);margin-top:3px;}
.sets-area{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px;}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;align-items:center;}
.set-num{font-size:12px;color:var(--text3);font-family:var(--mono);text-align:center;}
.set-input-wrap{position:relative;}
.set-input-label{position:absolute;top:50%;left:10px;transform:translateY(-50%);font-size:10px;color:var(--text3);font-family:var(--mono);pointer-events:none;}
.set-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 10px 10px 34px;color:var(--text);font-family:var(--mono);font-size:15px;font-weight:500;text-align:right;-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:var(--accent);background:#1e1e2e;}
.save-btn{width:100%;padding:18px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.save-btn:active{transform:scale(0.98);opacity:0.9;}

/* Progression summary */
.prog-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.prog-summary-title{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);}
.prog-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.prog-item:last-child{border-bottom:none;}
.prog-item-name{font-size:13px;font-weight:600;flex:1;}
.prog-item-badge{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;}
.prog-item-badge.up{background:rgba(109,250,188,0.15);color:var(--accent3);}
.prog-item-badge.keep{background:rgba(255,209,102,0.15);color:var(--yellow);}
.prog-item-badge.down{background:rgba(255,68,102,0.15);color:var(--red);}

/* History */
.session-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.session-log-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.session-log-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.session-log-date{font-size:12px;color:var(--text2);font-family:var(--mono);}
.session-log-vol{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono);}
.session-log-sets{font-size:11px;color:var(--text3);font-family:var(--mono);}
.session-log-body{padding:0 16px 14px;border-top:1px solid var(--border);display:none;}
.session-log-body.open{display:block;}
.log-ex{padding:8px 0;border-bottom:1px solid var(--border);}
.log-ex:last-child{border-bottom:none;}
.log-ex-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.log-ex-sets{display:flex;flex-wrap:wrap;gap:6px;}
.log-set-pill{font-size:11px;font-family:var(--mono);background:var(--surface2);border-radius:6px;padding:3px 8px;color:var(--text2);}
.delete-btn{margin-top:12px;width:100%;padding:10px;background:none;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.stat-value{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--accent);letter-spacing:-1px;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:var(--mono);}
.ex-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:600;margin-bottom:16px;-webkit-appearance:none;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:160px;margin-bottom:20px;}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:100px;}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.4s;}
.chart-bar.up{background:var(--accent3);}
.chart-bar.keep{background:var(--yellow);}
.chart-bar.neutral{background:var(--accent);}
.chart-bar-label{font-size:8px;color:var(--text3);font-family:var(--mono);text-align:center;}
.chart-bar-val{font-size:9px;color:var(--text2);font-family:var(--mono);}
.no-data{text-align:center;color:var(--text3);font-size:13px;padding:30px 0;}
.muscle-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.muscle-row:last-child{border-bottom:none;}
.muscle-name{font-size:13px;font-weight:600;width:90px;flex-shrink:0;}
.muscle-bar-bg{flex:1;background:var(--surface2);border-radius:4px;height:8px;}
.muscle-bar-fill{height:8px;border-radius:4px;background:var(--accent);}
.muscle-vol{font-size:11px;color:var(--text2);font-family:var(--mono);width:45px;text-align:right;flex-shrink:0;}
.trend-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-name{font-size:12px;font-weight:600;flex:1;}
.trend-val{font-size:13px;font-family:var(--mono);font-weight:700;}
.trend-val.up{color:var(--accent3);}
.trend-val.neutral{color:var(--text2);}
.trend-change{font-size:11px;font-family:var(--mono);color:var(--text3);}

/* Dados */
.dados-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.dados-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.dados-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.dados-desc{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.dados-btn{width:100%;padding:14px;border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.dados-btn.export{background:var(--accent);}
.dados-btn.import{background:var(--lower);color:var(--bg);}
.dados-btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.dados-stats{display:flex;justify-content:space-around;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:16px;}
.dados-stat{text-align:center;}
.dados-stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.dados-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:2px;}
.dados-tip{background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--orange);line-height:1.5;margin-bottom:14px;}
.dados-tip strong{display:block;margin-bottom:4px;font-size:13px;}
input[type="file"]{display:none;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent3);color:var(--bg);padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.history-empty{text-align:center;padding:60px 20px;color:var(--text3);}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-title">V<span>.</span>Treino</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('home')">Treino</button>
    <button class="nav-tab" onclick="showView('historico')">Histórico</button>
    <button class="nav-tab" onclick="showView('stats')">Stats</button>
    <button class="nav-tab" onclick="showView('dados')">Dados</button>
  </div>
</nav>
<div id="view-home" class="view active"></div>
<div id="view-historico" class="view"></div>
<div id="view-stats" class="view"></div>
<div id="view-dados" class="view"></div>
<div class="toast" id="toast"></div>

<script>
// ======================== WORKOUT DATA ========================
const INCREMENTS = {
  compound_large: 2.5,   // Squat, RDL, Bulgarian, Leg Press
  compound_upper: 2.5,   // Bench, Row, Shoulder Press
  isolation: 1.25,       // Curl, Triceps, Lateral Raise
  calf_abs: 2.5          // Calf, Crunch
};

const WORKOUTS = {
  upper1:{name:"Upper 1",type:"upper",day:"Segunda",sub:"Peito · Costas · Ombros · Braços",exercises:[
    {id:"elev",name:"Elevações na Barra",            sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["costas","biceps"],inc:"compound_upper"},
    {id:"mbp", name:"Machine Bench Press",           sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["peito","triceps"],inc:"compound_upper"},
    {id:"csr", name:"Chest-Supported Row",           sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["costas","biceps"],inc:"compound_upper"},
    {id:"mcf", name:"Machine Chest Fly",             sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["peito"],inc:"isolation"},
    {id:"clr", name:"Shoulder Trainer (Lateral)",    sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"isolation"},
    {id:"ctp", name:"Cable Triceps Pushdown",        sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["triceps"],inc:"isolation"},
    {id:"bc",  name:"Bayesian Curl",                 sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["biceps"],inc:"isolation"},
    {id:"rpd1",name:"Reverse Pec Deck / Face Pull",  sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"isolation"},
  ]},
  lower1:{name:"Lower 1",type:"lower",day:"Terça",sub:"Quad · Glúteo · Femoral · Gémeos",exercises:[
    {id:"bs",  name:"Barbell Squat (ou Belt Squat)", sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["quad","gluteo"],inc:"compound_large"},
    {id:"bss", name:"Bulgarian Split Squat",         sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["quad","gluteo"],inc:"compound_large"},
    {id:"slle1",name:"Single-Leg Leg Extension",     sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["quad"],inc:"isolation"},
    {id:"slc1",name:"Seated Leg Curl",               sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["femoral"],inc:"isolation"},
    {id:"mcr", name:"Smith Machine Calf Raise",      sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["gemeos"],inc:"calf_abs"},
    {id:"cc1", name:"Cable Crunch (Polia)",          sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["abdomen"],inc:"calf_abs"},
  ]},
  upper2:{name:"Upper 2",type:"upper",day:"Quinta",sub:"Costas · Peito · Ombros · Braços",exercises:[
    {id:"ilr", name:"Iso-Lateral Row (Titanium)",    sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["costas","biceps"],inc:"compound_upper"},
    {id:"ism", name:"Press Inclinado Isolateral",    sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["peito","ombros"],inc:"compound_upper"},
    {id:"tglp",name:"Triangle Grip Lat Pulldown",    sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["costas","biceps"],inc:"compound_upper"},
    {id:"msp", name:"Machine Shoulder Press",        sets:2,reps:"10–15",repsMin:10,repsMax:15,muscles:["ombros"],inc:"compound_upper"},
    {id:"ccf", name:"Cable Chest Fly",               sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["peito"],inc:"isolation"},
    {id:"ote", name:"Overhead Triceps Ext. (cabo)",  sets:2,reps:"10–15",repsMin:10,repsMax:15,muscles:["triceps"],inc:"isolation"},
    {id:"dlr", name:"Shoulder Trainer (Lateral)",    sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"isolation"},
    {id:"dic", name:"Dumbbell Incline Curl",         sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["biceps"],inc:"isolation"},
    {id:"rpd2",name:"Reverse Pec Deck / Face Pull",  sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"isolation"},
  ]},
  lower2:{name:"Lower 2",type:"lower",day:"Sexta",sub:"Femoral · Quad · Gémeos · Abdómen",exercises:[
    {id:"rdl", name:"Romanian Deadlift (RDL)",       sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["femoral","gluteo"],inc:"compound_large"},
    {id:"lp",  name:"Leg Press",                     sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["quad"],inc:"compound_large"},
    {id:"slle2",name:"Leg Extension (bilateral)",    sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["quad"],inc:"isolation"},
    {id:"slc2",name:"Seated Leg Curl",               sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["femoral"],inc:"isolation"},
    {id:"cr",  name:"Smith Machine Calf Raise",      sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["gemeos"],inc:"calf_abs"},
    {id:"cc2", name:"Cable Crunch (Polia)",          sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["abdomen"],inc:"calf_abs"},
  ]}
};

const DAYS = [
  {key:"upper1",label:"Seg"},{key:"lower1",label:"Ter"},
  {key:null,label:"Qua",name:"Natação",type:"cardio",sub:"Endurance"},
  {key:"upper2",label:"Qui"},{key:"lower2",label:"Sex"},
  {key:null,label:"Sáb",name:"Corrida",type:"cardio",sub:"Zone 2"},
  {key:null,label:"Dom",name:"Descanso",type:"rest",sub:"Recuperação"},
];

const MUSCLES={peito:"Peito",costas:"Costas",ombros:"Ombros",biceps:"Bíceps",triceps:"Tríceps",quad:"Quad",femoral:"Femoral",gluteo:"Glúteo",gemeos:"Gémeos",abdomen:"Abdómen"};

// ======================== STORAGE ========================
function getSessions(){try{return JSON.parse(localStorage.getItem('vt_sessions')||'[]');}catch(e){return[];}}
function saveSessions(s){localStorage.setItem('vt_sessions',JSON.stringify(s));}
function getLastSession(key){const s=getSessions().filter(s=>s.workoutKey===key);return s.length?s[s.length-1]:null;}
function getLastExData(key,exId){const l=getLastSession(key);if(!l)return null;return l.exercises.find(e=>e.id===exId)||null;}

// ======================== PROGRESSION LOGIC ========================
function analyzeProgression(ex, lastExData) {
  if (!lastExData) return null;
  const validSets = lastExData.sets.filter(s => s.weight > 0 && s.reps > 0);
  if (!validSets.length) return null;

  const weight = validSets[0].weight;
  const allReps = validSets.map(s => s.reps);
  const minReps = Math.min(...allReps);
  const allReachedMax = allReps.every(r => r >= ex.repsMax);
  const anyBelowMin = allReps.some(r => r < ex.repsMin);
  const increment = INCREMENTS[ex.inc] || 1.25;

  if (anyBelowMin) {
    const newWeight = Math.max(0, weight - increment);
    return { status: 'down', label: `↓ Reduz → ${newWeight}kg`, weight: newWeight };
  } else if (allReachedMax) {
    const newWeight = weight + increment;
    return { status: 'up', label: `↑ Aumenta → ${newWeight}kg`, weight: newWeight };
  } else {
    return { status: 'keep', label: `→ Mantém ${weight}kg`, weight: weight };
  }
}

function getSuggestedWeight(ex, workoutKey) {
  const lastEx = getLastExData(workoutKey, ex.id);
  if (!lastEx) return null;
  const prog = analyzeProgression(ex, lastEx);
  return prog ? prog.weight : null;
}

let currentWorkout = null;

// ======================== VIEWS ========================
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab')[['home','historico','stats','dados'].indexOf(v)].classList.add('active');
  if(v==='home')renderHome();
  if(v==='historico')renderHistorico();
  if(v==='stats')renderStats();
  if(v==='dados')renderDados();
}

// ======================== HOME ========================
function renderHome() {
  const container = document.getElementById('view-home');
  const sessions = getSessions();
  const todayIdx = new Date().getDay();
  const dayMap = [6,0,1,2,3,4,5];
  const todayDayIdx = dayMap[todayIdx];

  let html = `<p class="section-title">Semana de Treino</p><div class="day-grid">`;
  DAYS.forEach((d,i) => {
    const w = d.key ? WORKOUTS[d.key] : null;
    const type = w ? w.type : (d.type||'rest');
    const name = w ? w.name : d.name;
    const sub = w ? w.sub : d.sub;
    const isToday = i === todayDayIdx;
    const hasSessions = d.key && sessions.some(s=>s.workoutKey===d.key);
    html += `<div class="day-card ${type}" onclick="${d.key?`startWorkout('${d.key}')`:''}" style="${!d.key?'cursor:default':''}">
      <div class="day-label">${d.label}${isToday?' · hoje':''}</div>
      <div class="day-name">${name}</div>
      <div class="day-sub">${sub}</div>
      ${hasSessions?'<div class="day-badge"></div>':''}
    </div>`;
  });
  html += `</div>`;

  // Recent sessions
  const recent = [...sessions].reverse().slice(0,3);
  if (recent.length) {
    html += `<p class="section-title">Últimas Sessões</p>`;
    recent.forEach(s => {
      const w = WORKOUTS[s.workoutKey];
      html += `<div class="session-log"><div class="session-log-header">
        <div><div class="session-log-name">${w?w.name:s.workoutKey}</div><div class="session-log-date">${formatDate(s.date)}</div></div>
        <div style="text-align:right"><div class="session-log-vol">${calcVolume(s)} kg</div><div class="session-log-sets">vol. total</div></div>
      </div></div>`;
    });
  }
  container.innerHTML = html;
}

function startWorkout(key) { currentWorkout = key; renderSession(); }

function renderSession() {
  const w = WORKOUTS[currentWorkout];
  const container = document.getElementById('view-home');
  const last = getLastSession(currentWorkout);

  let html = `<button class="back-btn" onclick="renderHome()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Voltar
  </button>
  <div class="session-header">
    <div class="session-day" style="color:var(--${w.type})">${w.day} · ${w.name}</div>
    <div class="session-title">${w.sub}</div>
  </div>`;

  if (last) {
    html += `<div class="last-bar"><div class="last-bar-text">Última sessão: <strong>${formatDate(last.date)}</strong> · Vol: <strong>${calcVolume(last)} kg</strong></div></div>`;
  }

  w.exercises.forEach(ex => {
    const lastEx = getLastExData(currentWorkout, ex.id);
    const prog = lastEx ? analyzeProgression(ex, lastEx) : null;
    const suggestedWeight = prog ? prog.weight : null;

    html += `<div class="ex-card"><div class="ex-header">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">${ex.sets} séries · ${ex.reps}</div>
      ${prog ? `<div class="ex-suggestion ${prog.status}">${prog.label}</div>` : ''}
      ${lastEx ? `<div class="ex-prev">Anterior: ${lastEx.sets.map(s=>`${s.weight}kg×${s.reps}`).join(' · ')}</div>` : ''}
    </div><div class="sets-area">`;

    for (let i = 1; i <= ex.sets; i++) {
      const ls = lastEx && lastEx.sets[i-1];
      html += `<div class="set-row">
        <div class="set-num">${i}</div>
        <div class="set-input-wrap"><span class="set-input-label">kg</span>
          <input class="set-input" type="number" inputmode="decimal" id="w_${ex.id}_${i}" placeholder="${suggestedWeight || (ls?ls.weight:'')}">
        </div>
        <div class="set-input-wrap"><span class="set-input-label">×</span>
          <input class="set-input" type="number" inputmode="numeric" id="r_${ex.id}_${i}" placeholder="${ls?ls.reps:''}">
        </div>
      </div>`;
    }
    html += `</div></div>`;
  });

  html += `<button class="save-btn" onclick="saveSession()">💾 Guardar Sessão</button>`;
  container.innerHTML = html;
}

function saveSession() {
  const w = WORKOUTS[currentWorkout];
  let anyFilled = false;
  const exData = w.exercises.map(ex => {
    const sets = [];
    for (let i = 1; i <= ex.sets; i++) {
      const weight = parseFloat(document.getElementById(`w_${ex.id}_${i}`)?.value)||0;
      const reps = parseInt(document.getElementById(`r_${ex.id}_${i}`)?.value)||0;
      if (weight>0||reps>0) anyFilled = true;
      sets.push({weight, reps});
    }
    return {id:ex.id, name:ex.name, sets};
  });

  if (!anyFilled) { showToast('Preenche pelo menos uma série!'); return; }

  const session = {id:Date.now(), workoutKey:currentWorkout, date:new Date().toISOString(), exercises:exData};
  const sessions = getSessions(); sessions.push(session); saveSessions(sessions);

  // Show progression summary
  showProgressionSummary(exData, w);
}

function showProgressionSummary(exData, w) {
  const container = document.getElementById('view-home');
  let html = `<button class="back-btn" onclick="renderHome()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Voltar
  </button>
  <div style="margin-bottom:20px">
    <div style="font-size:22px;font-weight:800;margin-bottom:4px">✓ Sessão Guardada</div>
    <div style="font-size:13px;color:var(--text2)">${w.name} · ${formatDate(new Date().toISOString())}</div>
  </div>
  <p class="section-title">Progressão para a Próxima Sessão</p>
  <div class="prog-summary">
    <div class="prog-summary-title">Recomendações de Carga</div>`;

  w.exercises.forEach(ex => {
    const sessionEx = exData.find(e => e.id === ex.id);
    if (!sessionEx) return;
    const validSets = sessionEx.sets.filter(s => s.weight > 0 && s.reps > 0);
    if (!validSets.length) return;
    const prog = analyzeProgression(ex, sessionEx);
    if (!prog) return;

    html += `<div class="prog-item">
      <div class="prog-item-name">${ex.name}</div>
      <div class="prog-item-badge ${prog.status}">${prog.label}</div>
    </div>`;
  });

  html += `</div><button class="save-btn" onclick="renderHome()" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">Voltar ao Início</button>`;
  container.innerHTML = html;
}

// ======================== HISTÓRICO ========================
function renderHistorico() {
  const container = document.getElementById('view-historico');
  const sessions = [...getSessions()].reverse();
  if (!sessions.length) { container.innerHTML = `<div class="history-empty"><p>Ainda não há sessões registadas.</p></div>`; return; }

  let html = `<p class="section-title">${sessions.length} sessão${sessions.length!==1?'ões':''} registada${sessions.length!==1?'s':''}</p>`;
  sessions.forEach(s => {
    const w = WORKOUTS[s.workoutKey];
    const vol = calcVolume(s);
    const totalSets = s.exercises.reduce((a,e)=>a+e.sets.filter(st=>st.weight>0||st.reps>0).length,0);
    html += `<div class="session-log">
      <div class="session-log-header" onclick="toggleLog(this)">
        <div><div class="session-log-name">${w?w.name:s.workoutKey}</div><div class="session-log-date">${formatDate(s.date)}</div></div>
        <div style="text-align:right"><div class="session-log-vol">${vol} kg</div><div class="session-log-sets">${totalSets} séries</div></div>
      </div>
      <div class="session-log-body">`;
    s.exercises.forEach(ex => {
      const valid = ex.sets.filter(st=>st.weight>0||st.reps>0);
      if (!valid.length) return;
      html += `<div class="log-ex"><div class="log-ex-name">${ex.name}</div>
        <div class="log-ex-sets">${valid.map(st=>`<span class="log-set-pill">${st.weight}kg × ${st.reps}</span>`).join('')}</div>
      </div>`;
    });
    html += `<button class="delete-btn" onclick="deleteSession(${s.id})">Eliminar sessão</button></div></div>`;
  });
  container.innerHTML = html;
}

function toggleLog(el) { el.nextElementSibling.classList.toggle('open'); }
function deleteSession(id) {
  if (!confirm('Eliminar esta sessão?')) return;
  saveSessions(getSessions().filter(s=>s.id!==id));
  renderHistorico(); showToast('Sessão eliminada');
}

// ======================== STATS ========================
function renderStats() {
  const container = document.getElementById('view-stats');
  const sessions = getSessions();
  const totalVol = sessions.reduce((a,s)=>a+calcVolume(s),0);
  const totalSets = sessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.filter(st=>st.weight>0).length,0),0);
  const totalSessions = sessions.length;
  const avgVol = totalSessions > 0 ? Math.round(totalVol/totalSessions) : 0;

  // Streak
  const streak = calcStreak(sessions);

  // Muscle volume
  const muscleVol = {};
  sessions.forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    s.exercises.forEach(se => {
      const def = w.exercises.find(e=>e.id===se.id); if(!def) return;
      se.sets.forEach(st => {
        if(st.weight>0&&st.reps>0) def.muscles.forEach(m=>{muscleVol[m]=(muscleVol[m]||0)+st.weight*st.reps;});
      });
    });
  });
  const maxMV = Math.max(...Object.values(muscleVol), 1);

  // All exercises for chart
  const allEx = [];
  Object.values(WORKOUTS).forEach(w=>w.exercises.forEach(ex=>{
    if(!allEx.find(e=>e.id===ex.id)) allEx.push({id:ex.id,name:ex.name,workoutKey:Object.keys(WORKOUTS).find(k=>WORKOUTS[k].exercises.find(e2=>e2.id===ex.id))});
  }));

  let html = `<p class="section-title">Resumo Geral</p>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sessões</div></div>
    <div class="stat-card"><div class="stat-value">${Math.round(totalVol/1000*10)/10}k</div><div class="stat-label">Volume kg</div></div>
    <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">Séries Total</div></div>
    <div class="stat-card"><div class="stat-value">${avgVol}</div><div class="stat-label">kg / Sessão</div></div>
  </div>`;

  // Streak
  if (streak > 0) {
    html += `<div class="stat-card" style="margin-bottom:24px;display:flex;align-items:center;gap:16px">
      <div style="font-size:36px">🔥</div>
      <div><div class="stat-value" style="color:var(--orange)">${streak}</div><div class="stat-label">Semanas consecutivas a treinar</div></div>
    </div>`;
  }

  // Progression chart
  html += `<p class="section-title">Progressão de Carga</p>
  <select class="ex-select" id="ex-select" onchange="updateChart()">`;
  allEx.forEach(ex => { html += `<option value="${ex.id}">${ex.name}</option>`; });
  html += `</select><div class="chart-wrap" id="chart-wrap"></div>`;

  // Top progressions
  html += `<p class="section-title">Maiores Progressões</p><div class="stat-card" style="margin-bottom:24px">`;
  const progressions = calcTopProgressions(sessions, allEx);
  if (progressions.length) {
    progressions.slice(0,5).forEach(p => {
      html += `<div class="trend-row">
        <div class="trend-name">${p.name}</div>
        <div style="text-align:right">
          <div class="trend-val up">+${p.gain}kg</div>
          <div class="trend-change">${p.from}kg → ${p.to}kg</div>
        </div>
      </div>`;
    });
  } else {
    html += `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Ainda sem dados suficientes</div>`;
  }
  html += `</div>`;

  // Muscle volume
  html += `<p class="section-title">Volume por Músculo</p><div class="stat-card" style="margin-bottom:24px">`;
  Object.entries(MUSCLES).forEach(([key,label]) => {
    const vol = muscleVol[key]||0;
    const pct = Math.round((vol/maxMV)*100);
    html += `<div class="muscle-row">
      <div class="muscle-name">${label}</div>
      <div class="muscle-bar-bg"><div class="muscle-bar-fill" style="width:${pct}%"></div></div>
      <div class="muscle-vol">${Math.round(vol/1000*10)/10}k</div>
    </div>`;
  });
  html += `</div>`;

  container.innerHTML = html;
  updateChart();
}

function updateChart() {
  const exId = document.getElementById('ex-select')?.value; if(!exId) return;
  const points = [];
  getSessions().forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    const se = s.exercises.find(e=>e.id===exId); if(!se) return;
    const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return;
    const maxW = Math.max(...valid.map(st=>st.weight));
    points.push({date:formatDateShort(s.date), weight:maxW});
  });

  const wrap = document.getElementById('chart-wrap'); if(!wrap) return;
  if (!points.length) { wrap.innerHTML=`<div class="no-data">Ainda não há dados para este exercício.</div>`; return; }

  const maxW = Math.max(...points.map(p=>p.weight));
  const recent = points.slice(-10);

  let html = `<div class="chart-bars">`;
  recent.forEach((p,i) => {
    const h = Math.max(4, Math.round((p.weight/maxW)*90));
    const prev = i>0?recent[i-1].weight:p.weight;
    const cls = p.weight>prev?'up':p.weight<prev?'keep':'neutral';
    html += `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${p.weight}</div>
      <div class="chart-bar ${cls}" style="height:${h}px"></div>
      <div class="chart-bar-label">${p.date}</div>
    </div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const weeks = new Set(sessions.map(s => {
    const d = new Date(s.date);
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    return Math.floor((d - startOfYear) / (7*24*60*60*1000));
  }));
  const weeksArr = [...weeks].sort((a,b)=>b-a);
  let streak = 0;
  const currentWeek = weeksArr[0];
  for (let i=0; i<weeksArr.length; i++) {
    if (weeksArr[i] === currentWeek - i) streak++;
    else break;
  }
  return streak;
}

function calcTopProgressions(sessions, allEx) {
  const progressions = [];
  allEx.forEach(ex => {
    const exSessions = sessions.filter(s => {
      const w = WORKOUTS[s.workoutKey]; if(!w) return false;
      return s.exercises.some(e=>e.id===ex.id);
    });
    if (exSessions.length < 2) return;
    const weights = exSessions.map(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return 0;
      const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return 0;
      return Math.max(...valid.map(st=>st.weight));
    }).filter(w=>w>0);
    if (weights.length < 2) return;
    const gain = weights[weights.length-1] - weights[0];
    if (gain > 0) progressions.push({name:ex.name, gain, from:weights[0], to:weights[weights.length-1]});
  });
  return progressions.sort((a,b)=>b.gain-a.gain);
}

// ======================== DADOS ========================
function renderDados() {
  const container = document.getElementById('view-dados');
  const sessions = getSessions();
  const totalVol = sessions.reduce((a,s)=>a+calcVolume(s),0);
  const lastDate = sessions.length ? formatDate(sessions[sessions.length-1].date) : '—';

  container.innerHTML = `
    <p class="section-title">Dados Guardados</p>
    <div class="dados-stats">
      <div class="dados-stat"><div class="dados-stat-val">${sessions.length}</div><div class="dados-stat-lbl">Sessões</div></div>
      <div class="dados-stat"><div class="dados-stat-val">${Math.round(totalVol/1000*10)/10}k</div><div class="dados-stat-lbl">Volume kg</div></div>
    </div>
    <div class="dados-tip">
      <strong>💡 Como manter os dados seguros</strong>
      Faz backup 1× por semana após o treino de sexta. Guarda nos Ficheiros → iCloud Drive para sincronização automática.
    </div>
    <div class="dados-card">
      <div class="dados-title">Exportar Backup</div>
      <div class="dados-desc">Guarda um ficheiro com todos os teus treinos no iCloud Drive.</div>
      <button class="dados-btn export" onclick="exportData()">📥 Guardar Backup</button>
      ${sessions.length?`<div style="font-size:11px;color:var(--text3);margin-top:10px;text-align:center;font-family:var(--mono)">Última sessão: ${lastDate}</div>`:''}
    </div>
    <div class="dados-card">
      <div class="dados-title">Importar Backup</div>
      <div class="dados-desc">Restaurar dados a partir de um ficheiro de backup.</div>
      <input type="file" id="import-file" accept=".json" onchange="importData(event)">
      <button class="dados-btn import" onclick="document.getElementById('import-file').click()">📤 Escolher Ficheiro</button>
    </div>
    <div class="dados-card">
      <div class="dados-title" style="color:var(--red)">Apagar Tudo</div>
      <div class="dados-desc">Apaga todos os dados. Faz backup primeiro!</div>
      <button class="dados-btn danger" onclick="clearAllData()">🗑️ Apagar Todos os Dados</button>
    </div>`;
}

function exportData() {
  const sessions = getSessions();
  if (!sessions.length) { showToast('Sem dados para exportar'); return; }
  const data = {version:1, exportDate:new Date().toISOString(), sessionCount:sessions.length, sessions};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const fname = `treino_backup_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const a = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado ✓');
}

function importData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions||!Array.isArray(data.sessions)) throw new Error('Formato inválido');
      const current = getSessions();
      const choice = current.length > 0 ?
        confirm(`Tens ${current.length} sessões. Substituir pelos dados do backup (${data.sessions.length} sessões)?\n\nOK = Substituir\nCancelar = Combinar`) : true;
      if (choice) {
        saveSessions(data.sessions);
        showToast(`${data.sessions.length} sessões importadas ✓`);
      } else {
        const existingIds = new Set(current.map(s=>s.id));
        const newOnes = data.sessions.filter(s=>!existingIds.has(s.id));
        const combined = [...current,...newOnes].sort((a,b)=>new Date(a.date)-new Date(b.date));
        saveSessions(combined);
        showToast(`${newOnes.length} novas sessões combinadas ✓`);
      }
      setTimeout(()=>renderDados(), 500);
    } catch(err) { alert('Ficheiro inválido.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (!confirm('Tens a certeza? Esta ação não pode ser desfeita.\nFizeste backup?')) return;
  if (!confirm('Última confirmação — apagar mesmo tudo?')) return;
  saveSessions([]);
  showToast('Todos os dados apagados');
  setTimeout(()=>renderDados(), 500);
}

// ======================== UTILS ========================
function calcVolume(s){let v=0;s.exercises.forEach(ex=>ex.sets.forEach(st=>{if(st.weight>0&&st.reps>0)v+=st.weight*st.reps;}));return Math.round(v);}
function formatDate(iso){return new Date(iso).toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function formatDateShort(iso){const d=new Date(iso);return`${d.getDate()}/${d.getMonth()+1}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('DOMContentLoaded', function() { renderHome(); });
</script>
