<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#070908;--ink:#f0f4f1;--mut:#5d6b63;--accent:#39FF88;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;position:relative;padding:24px;
}
/* faint breathing aura behind the mark — "still becoming", never static */
.aura{
  position:absolute;top:50%;left:50%;width:min(120vw,900px);height:min(120vw,900px);
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle, rgba(57,255,136,0.10), transparent 60%);
  filter:blur(40px);animation:breathe 7s ease-in-out infinite;pointer-events:none;
}
@keyframes breathe{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(0.95);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08);}}
.wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;}
.mark{width:min(72vw,520px);height:auto;opacity:0;animation:rise 1.4s cubic-bezier(.16,1,.3,1) forwards;}
.mark path{fill:var(--ink);}
.tagline{
  margin-top:30px;font-size:clamp(11px,3.4vw,16px);font-weight:500;
  letter-spacing:0.55em;color:var(--mut);padding-left:0.55em;
  opacity:0;animation:fade 1.2s ease forwards 0.7s;
}
.tagline b{color:var(--accent);font-weight:500;}
/* the dot pulses — the only living color */
.tagline .dot{display:inline-block;color:var(--accent);animation:pulse 2.4s ease-in-out infinite 2s;}
@keyframes rise{0%{opacity:0;transform:translateY(18px);}100%{opacity:1;transform:translateY(0);}}
@keyframes fade{to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
@media (prefers-reduced-motion: reduce){
  .aura,.tagline .dot{animation:none;}
  .mark,.tagline{animation-duration:0.01s;}
}
</style>
</head>
