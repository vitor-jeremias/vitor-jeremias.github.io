<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>V. Treino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f7f5;--surface:#ffffff;--surface2:#f0f4f0;--border:#e0e8e0;
  --accent:#2d7a4f;--accent3:#4CAF50;--upper:#2d7a4f;--lower:#1a5c38;
  --orange:#e67e22;--red:#e74c3c;--yellow:#f39c12;
  --text:#1a2e1a;--text2:#5a7a5a;--text3:#8aaa8a;
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;--radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden;}
.nav{position:sticky;top:0;z-index:100;background:rgba(245,247,245,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-title{font-size:18px;font-weight:800;}.nav-title span{color:var(--accent);}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;}
.nav-tab{padding:7px 13px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:600;border:none;background:none;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.nav-tab.active{background:var(--accent);color:#fff;}
.view{display:none;padding:20px;padding-bottom:48px;}.view.active{display:block;}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.day-card:active{transform:scale(0.97);}
.day-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.day-card.upper::before{background:var(--upper);}
.day-card.lower::before{background:var(--lower);}
.day-card.cardio::before{background:var(--orange);}
.day-card.rest::before{background:var(--text3);}
.day-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;font-family:var(--mono);}
.day-name{font-size:20px;font-weight:800;margin-bottom:4px;}
.day-sub{font-size:11px;color:var(--text2);}
.day-badge{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--accent3);}
.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono);}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);font-family:var(--font);font-size:14px;cursor:pointer;margin-bottom:20px;padding:0;}
.session-header{margin-bottom:20px;}
.session-day{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px;}
.session-title{font-size:28px;font-weight:800;letter-spacing:-0.3px;margin-bottom:5px;}
.last-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;}
.last-bar-text{font-size:12px;color:var(--text2);}
.last-bar-text strong{color:var(--text);}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.ex-header{padding:14px 16px 10px;}
.ex-name{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2;}
.ex-meta{font-size:15px;color:var(--text2);font-family:var(--mono);line-height:1.4;}
.ex-suggestion{font-size:16px;font-weight:700;font-family:var(--mono);margin-top:8px;padding:8px 14px;border-radius:8px;display:inline-block;}
.ex-suggestion.up{background:rgba(45,122,79,0.1);color:var(--accent);}
.ex-suggestion.keep{background:rgba(243,156,18,0.1);color:var(--yellow);}
.ex-suggestion.down{background:rgba(231,76,60,0.1);color:var(--red);}
.ex-prev{font-size:15px;color:var(--text2);font-family:var(--mono);margin-top:6px;}
.ex-warmup{font-size:11px;font-family:var(--mono);margin-top:5px;padding:6px 10px;border-radius:8px;background:rgba(230,126,34,0.08);border:1px solid rgba(230,126,34,0.2);color:var(--orange);}
.ex-warmup-title{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;opacity:0.8;}
.ex-warmup-sets{color:var(--text);font-weight:600;font-size:15px;}
.sets-area{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr;gap:10px;align-items:center;}
.set-num{font-size:18px;color:var(--text2);font-family:var(--mono);text-align:center;font-weight:700;}
.set-input-wrap{position:relative;}
.set-input-label{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:14px;color:var(--text3);font-family:var(--mono);pointer-events:none;font-weight:600;}
.set-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 14px 16px 42px;color:var(--accent);font-family:var(--mono);font-size:22px;font-weight:700;text-align:right;-webkit-appearance:none;}
.set-input::placeholder{color:var(--text3);font-weight:500;opacity:0.7;}
.set-input:focus{outline:none;border-color:var(--accent);background:#e8f5e9;}
.save-btn{width:100%;padding:22px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:var(--font);font-size:20px;font-weight:800;cursor:pointer;margin-top:12px;transition:all 0.2s;}
.save-btn:active{transform:scale(0.98);opacity:0.9;}

/* Progression summary */
.prog-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.prog-summary-title{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);}
.prog-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.prog-item:last-child{border-bottom:none;}
.prog-item-name{font-size:13px;font-weight:600;flex:1;}
.prog-item-badge{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;}
.prog-item-badge.up{background:rgba(45,122,79,0.1);color:var(--accent);}
.prog-item-badge.keep{background:rgba(243,156,18,0.1);color:var(--yellow);}
.prog-item-badge.down{background:rgba(231,76,60,0.1);color:var(--red);}

/* History */
.session-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.session-log-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.session-log-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.session-log-date{font-size:12px;color:var(--text2);font-family:var(--mono);}
.session-log-vol{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono);}
.session-log-sets{font-size:11px;color:var(--text3);font-family:var(--mono);}
.session-log-body{padding:0 16px 14px;border-top:1px solid var(--border);display:none;}
.session-log-body.open{display:block;}
.log-ex{padding:8px 0;border-bottom:1px solid var(--border);}
.log-ex:last-child{border-bottom:none;}
.log-ex-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.log-ex-sets{display:flex;flex-wrap:wrap;gap:6px;}
.log-set-pill{font-size:11px;font-family:var(--mono);background:var(--surface2);border-radius:6px;padding:3px 8px;color:var(--text2);}
.delete-btn{margin-top:12px;width:100%;padding:10px;background:none;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.cmp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.cmp-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);font-weight:600;margin-bottom:8px;}
.cmp-value{font-size:30px;font-weight:800;font-family:var(--mono);color:var(--text);letter-spacing:-1px;line-height:1;}
.cmp-unit{font-size:15px;font-weight:600;color:var(--text3);margin-left:3px;}
.cmp-delta{display:inline-block;font-size:14px;font-weight:700;font-family:var(--mono);margin-top:8px;padding:3px 8px;border-radius:6px;}
.cmp-delta.up{background:rgba(45,122,79,0.1);color:var(--accent);}
.cmp-delta.down{background:rgba(231,76,60,0.1);color:var(--red);}
.cmp-prev{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:6px;}
.trend-icon{font-size:16px;font-weight:700;width:20px;text-align:center;flex-shrink:0;}
.trend-icon.up{color:var(--accent);}
.trend-icon.down{color:var(--red);}
.trend-icon.keep{color:var(--text3);}
.trend-val.keep{color:var(--text3);}
.trend-val.down{color:var(--red);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.stat-card.kpi{position:relative;overflow:hidden;padding-left:20px;}
.stat-card.kpi::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--kpi);}
.stat-value{font-size:30px;font-weight:800;font-family:var(--mono);color:var(--accent);letter-spacing:-1px;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:6px;font-family:var(--mono);font-weight:600;}
.ex-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;margin-bottom:16px;-webkit-appearance:none;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px 16px;min-height:160px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.chart-bars{display:flex;align-items:flex-end;gap:7px;height:130px;}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;flex:1;height:100%;}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:6px;transition:height 0.5s cubic-bezier(0.34,1.3,0.64,1);position:relative;}
.chart-bar.up{background:linear-gradient(180deg,#4CAF50 0%,#2d7a4f 100%);}
.chart-bar.keep{background:linear-gradient(180deg,#f5b545 0%,#e67e22 100%);}
.chart-bar.neutral{background:linear-gradient(180deg,#4d9970 0%,#2d7a4f 100%);}
.chart-bar.current{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--accent);}
.chart-bar-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-align:center;font-weight:600;}
.chart-bar-val{font-size:11px;color:var(--text);font-family:var(--mono);font-weight:700;}
.no-data{text-align:center;color:var(--text3);font-size:13px;padding:30px 0;}
.muscle-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.muscle-row:last-child{border-bottom:none;}
.muscle-name{font-size:14px;font-weight:600;width:90px;flex-shrink:0;color:var(--text);}
.muscle-bar-bg{flex:1;background:var(--surface2);border-radius:5px;height:12px;overflow:hidden;}
.muscle-bar-fill{height:12px;border-radius:5px;background:linear-gradient(90deg,#4d9970,#2d7a4f);transition:width 0.5s ease;}
.muscle-vol{font-size:12px;color:var(--text2);font-family:var(--mono);font-weight:600;width:48px;text-align:right;flex-shrink:0;}
.trend-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-name{font-size:12px;font-weight:600;flex:1;}
.trend-val{font-size:13px;font-family:var(--mono);font-weight:700;}
.trend-val.up{color:var(--accent3);}
.trend-val.neutral{color:var(--text2);}
.trend-change{font-size:11px;font-family:var(--mono);color:var(--text3);}

/* Dados */
.dados-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.dados-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.dados-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.dados-desc{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.dados-btn{width:100%;padding:14px;border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.dados-btn.export{background:var(--accent);}
.dados-btn.import{background:var(--lower);color:var(--bg);}
.dados-btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.dados-stats{display:flex;justify-content:space-around;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:16px;}
.dados-stat{text-align:center;}
.dados-stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.dados-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:2px;}
.dados-tip{background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--orange);line-height:1.5;margin-bottom:14px;}
.dados-tip strong{display:block;margin-bottom:4px;font-size:13px;}
input[type="file"]{display:none;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;box-shadow:0 4px 12px rgba(45,122,79,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.history-empty{text-align:center;padding:60px 20px;color:var(--text3);}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-title">V<span>.</span>Treino</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('home')">Treino</button>
    <button class="nav-tab" onclick="showView('historico')">Histórico</button>
    <button class="nav-tab" onclick="showView('stats')">Stats</button>
    <button class="nav-tab" onclick="showView('dados')">Dados</button>
  </div>
</nav>
<div id="view-home" class="view active"></div>
<div id="view-historico" class="view"></div>
<div id="view-stats" class="view"></div>
<div id="view-dados" class="view"></div>
<div class="toast" id="toast"></div>

<script>
// ======================== WORKOUT DATA ========================
const INCREMENTS = {

const WORKOUTS = {

    {id:"elev",name:"Elevações na Barra",            sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["costas","biceps"],inc:"bodyweight",bodyweight:true,rest:"2–3 min"},

    {id:"bc",  name:"Bayesian Curl",                 sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["biceps"],inc:"cable",rest:"90 seg",pulley:"Polia baixa (canela)"},

  ]},
  lower1:{name:"Lower 1",type:"lower",day:"Terça",sub:"Quad · Glúteo · Femoral · Gémeos",exercises:[

  upper2:{name:"Upper 2",type:"upper",day:"Quinta",sub:"Costas · Peito · Ombros · Braços",exercises:[

    {id:"dlr", name:"Shoulder Trainer Lateral",    sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"machine",rest:"90 seg"},
    {id:"dic", name:"Dumbbell Incline Curl",         sets:3,reps:"10–15",repsMin:10,repsMax:15,muscles:["biceps"],inc:"dumbbell",rest:"90 seg"},
    {id:"rpd2",name:"Reverse Pec Deck",              sets:3,reps:"15–20",repsMin:15,repsMax:20,muscles:["ombros"],inc:"machine",rest:"90 seg"},
  ]},
  lower2:{name:"Lower 2",type:"lower",day:"Sexta",sub:"Femoral · Quad · Gémeos · Abdómen",exercises:[
    {id:"rdl", name:"Romanian Deadlift",       sets:3,reps:"6–10",repsMin:6,repsMax:10,muscles:["femoral","gluteo"],inc:"barbell",warmup:true,rest:"2–3 min"},

// ======================== PROGRESSION LOGIC ========================
function analyzeProgression(ex, lastExData) {
  if (!lastExData) return null;
  const validSets = lastExData.sets.filter(s => s.weight > 0 && s.reps > 0);
  if (!validSets.length) return null;

  const weight = validSets[0].weight;
  const allReps = validSets.map(s => s.reps);
  const minReps = Math.min(...allReps);
  const allReachedMax = allReps.every(r => r >= ex.repsMax);
  const anyBelowMin = allReps.some(r => r < ex.repsMin);

  // Cable Chest Fly uses a fixed stack (9-14-18-23...)
  if (ex.inc === 'cable_fly') {
    const idx = CABLE_FLY_STACK.indexOf(weight);
    if (anyBelowMin && idx > 0) {
      const nw = CABLE_FLY_STACK[idx-1];
      return { status: 'down', label: `↓ Reduz → ${nw}kg`, weight: nw };
    } else if (allReachedMax && idx >= 0 && idx < CABLE_FLY_STACK.length-1) {
      const nw = CABLE_FLY_STACK[idx+1];
      return { status: 'up', label: `↑ Aumenta → ${nw}kg`, weight: nw };
    } else {
      return { status: 'keep', label: `→ Mantém ${weight}kg`, weight: weight };
    }
  }

  const increment = INCREMENTS[ex.inc] || 2.5;

  if (anyBelowMin) {
    const newWeight = Math.max(0, weight - increment);
    return { status: 'down', label: `↓ Reduz → ${newWeight}kg`, weight: newWeight };
  } else if (allReachedMax) {
    const newWeight = weight + increment;
    return { status: 'up', label: `↑ Aumenta → ${newWeight}kg`, weight: newWeight };
  } else {
    return { status: 'keep', label: `→ Mantém ${weight}kg`, weight: weight };
  }
}

function getSuggestedWeight(ex, workoutKey) {
  const lastEx = getLastExData(workoutKey, ex.id);
  if (!lastEx) return null;
  const prog = analyzeProgression(ex, lastEx);
  return prog ? prog.weight : null;
}

function calcWarmup(ex, workoutKey) {
  const workWeight = getSuggestedWeight(ex, workoutKey);
  if (!workWeight || workWeight <= 0) return null;
  const step = (ex.inc === 'machine' || ex.inc === 'cable' || ex.inc === 'barbell') ? 5 : 2.5;
  const round = (v) => Math.round(v / step) * step;
  let w50 = round(workWeight * 0.5);
  let w75 = round(workWeight * 0.75);
  // Squat: empty bar first, then warmup sets
  if (ex.id === 'bs') {
    return { text: `barra vazia × 10  →  ${w50}kg × 8  →  ${w75}kg × 4`, work: workWeight };
  }
  // RDL (barbell): don't suggest below empty bar (20kg)
  if (ex.inc === 'barbell') {
    if (w50 < 20) w50 = 20;
    if (w75 < 20) w75 = 20;
  }
  return { text: `${w50}kg × 10  →  ${w75}kg × 6`, work: workWeight };
}

let timerInterval = null;
let timerStart = null;
let timerElapsed = 0; // seconds, frozen when stopped

function timerKey() { return 'vt_timer_' + currentWorkout; }

function saveTimerState() {
  if (!currentWorkout) return;
  try {
    localStorage.setItem(timerKey(), JSON.stringify({ start: timerStart, elapsed: timerElapsed }));
  } catch(e) {}
}

function clearTimerState() {
  try { localStorage.removeItem(timerKey()); } catch(e) {}
}

function resetTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerStart = null;
  timerElapsed = 0;
}

function restoreTimer() {
  if (!currentWorkout) return;
  try {
    const raw = localStorage.getItem(timerKey());
    if (!raw) return;
    const st = JSON.parse(raw);
    timerElapsed = st.elapsed || 0;
    timerStart = st.start || null;
    const btn = document.getElementById('timer-btn');
    if (timerStart) {
      // was running — resume ticking
      timerInterval = setInterval(updateTimerDisplay, 1000);
      if (btn) { btn.textContent = '⏸ Pausar'; btn.style.background = 'var(--orange)'; }
    } else if (timerElapsed > 0) {
      if (btn) { btn.textContent = '▶ Retomar'; btn.style.background = 'var(--accent)'; }
    }
    updateTimerDisplay();
  } catch(e) {}
}

function formatTimer(sec) {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = sec%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay() {
  const disp = document.getElementById('timer-display');
  if (!disp) return;
  let total = timerElapsed;
  if (timerStart) total += Math.floor((Date.now()-timerStart)/1000);
  disp.textContent = formatTimer(total);
}

function toggleTimer() {
  const btn = document.getElementById('timer-btn');
  if (timerStart) {
    // pause
    timerElapsed += Math.floor((Date.now()-timerStart)/1000);
    timerStart = null;
    clearInterval(timerInterval); timerInterval = null;
    if (btn) { btn.textContent = '▶ Retomar'; btn.style.background = 'var(--accent)'; }
  } else {
    // start/resume
    timerStart = Date.now();
    timerInterval = setInterval(updateTimerDisplay, 1000);
    if (btn) { btn.textContent = '⏸ Pausar'; btn.style.background = 'var(--orange)'; }
    updateTimerDisplay();
  }
  saveTimerState();
}

function getTimerSeconds() {
  let total = timerElapsed;
  if (timerStart) total += Math.floor((Date.now()-timerStart)/1000);
  return total;
}

      ${ex.bodyweight ? `<div class="ex-prev" style="color:var(--text3)">Lastro 0 = só peso corporal. Adiciona lastro quando fizeres 3×${ex.repsMax} com RIR 2+.</div>` : ''}
    </div><div class="sets-area">`;

    for (let i = 1; i <= ex.sets; i++) {
      const ls = lastEx && lastEx.sets[i-1];
      html += `<div class="set-row">
        <div class="set-num">${i}</div>
        <div class="set-input-wrap"><span class="set-input-label">${ex.bodyweight ? 'lastro' : 'kg'}</span>
          <input class="set-input" type="number" inputmode="decimal" id="w_${ex.id}_${i}" oninput="saveDraft()" placeholder="${suggestedWeight || (ls?ls.weight:(ex.bodyweight?'0':''))}" style="${ex.bodyweight?'padding-left:48px':''}">
        </div>
        <div class="set-input-wrap"><span class="set-input-label">×</span>
          <input class="set-input" type="number" inputmode="numeric" id="r_${ex.id}_${i}" oninput="saveDraft()" placeholder="${ls?ls.reps:''}">
        </div>
      </div>`;
    }
    html += `</div></div>`;
  });

  // Core reference (não registável — prevenção para corrida)
  if (w.coreRef && w.coreRef.length) {
    html += `<div class="ex-card" style="background:var(--surface2)"><div class="ex-header">
      <div class="ex-name" style="font-size:15px">Core para corrida</div>
      <div class="ex-meta">No fim — prevenção para corrida</div>
    </div><div style="padding:4px 16px 14px">`;
    w.coreRef.forEach((item,i) => {
      html += `<div style="font-size:14px;color:var(--text);padding:7px 0;${i<w.coreRef.length-1?'border-bottom:1px solid var(--border)':''}">${item}</div>`;
    });
    html += `</div></div>`;
  }

  html += `<button class="save-btn" onclick="saveSession()">💾 Guardar Sessão</button>`;
  container.innerHTML = html;
  loadDraft();
}

async function saveSession() {
  const w = WORKOUTS[currentWorkout];
  let anyFilled = false;
  const exData = w.exercises.map(ex => {
    const sets = [];
    for (let i = 1; i <= ex.sets; i++) {
      const weight = parseFloat(document.getElementById(`w_${ex.id}_${i}`)?.value)||0;
      const reps = parseInt(document.getElementById(`r_${ex.id}_${i}`)?.value)||0;
      if (weight>0||reps>0) anyFilled = true;
      sets.push({weight, reps});
    }
    return {id:ex.id, name:ex.name, sets};
  });

  if (!anyFilled) { showToast('Preenche pelo menos uma série!'); return; }

  const session = {id:Date.now(), workoutKey:currentWorkout, date:new Date().toISOString(), exercises:exData, duration:getTimerSeconds()};
  resetTimer();
  showToast('A guardar...');
  await addSession(session);
  clearDraft();
  clearTimerState();
  showProgressionSummary(exData, w);
}

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Voltar
  </button>
  <div style="margin-bottom:20px">
    <div style="font-size:22px;font-weight:800;margin-bottom:4px">✓ Sessão Guardada</div>
    <div style="font-size:13px;color:var(--text2)">${w.name} · ${formatDate(new Date().toISOString())}</div>
  </div>
  <p class="section-title">Progressão para a Próxima Sessão</p>
  <div class="prog-summary">
    <div class="prog-summary-title">Recomendações de Carga</div>`;

  w.exercises.forEach(ex => {
    const sessionEx = exData.find(e => e.id === ex.id);
    if (!sessionEx) return;

// ======================== STATS ========================
function calcWeekComparison(sessions) {
  const now = new Date();
  const dayMs = 24*60*60*1000;
  const thisWeekStart = new Date(now - 7*dayMs);
  const lastWeekStart = new Date(now - 14*dayMs);
  let thisVol=0, lastVol=0, thisCount=0, lastCount=0;
  sessions.forEach(s => {
    const d = new Date(s.date);
    const v = calcVolume(s);
    if (d >= thisWeekStart) { thisVol+=v; thisCount++; }
    else if (d >= lastWeekStart) { lastVol+=v; lastCount++; }
  });
  return { thisVol, lastVol, thisCount, lastCount };
}

function calcExerciseTrends(sessions, allEx) {
  const trends = [];
  allEx.forEach(ex => {
    const points = [];
    sessions.forEach(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return;
      const valid = se.sets.filter(st=>st.weight>0&&st.reps>0);
      if (!valid.length) return;
      const topWeight = Math.max(...valid.map(st=>st.weight));
      points.push({date:new Date(s.date), weight:topWeight});
    });
    if (points.length < 2) return; // need 2+ to show trend
    points.sort((a,b)=>a.date-b.date);
    const recent = points.slice(-3); // last 3 sessions
    const first = recent[0].weight;
    const last = recent[recent.length-1].weight;
    let status, label;
    if (last > first) { status='up'; label='A subir'; }
    else if (last < first) { status='down'; label='A descer'; }
    else { status='keep'; label='Estagnado'; }
    trends.push({ name: ex.name, status, label, current: last, sessions: points.length });
  });
  // Sort: up first, then stagnant, then down
  const order = {up:0, keep:1, down:2};
  return trends.sort((a,b)=>order[a.status]-order[b.status]);
}

function renderStats() {
  const container = document.getElementById('view-stats');

  const totalSessions = sessions.length;
  const avgVol = totalSessions > 0 ? Math.round(totalVol/totalSessions) : 0;
  const durSessions = sessions.filter(s=>s.duration>0);
  const avgDuration = durSessions.length > 0 ? Math.round(durSessions.reduce((a,s)=>a+s.duration,0)/durSessions.length) : 0;

  // Streak
  const streak = calcStreak(sessions);

  const muscleVol = {};
  sessions.forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    s.exercises.forEach(se => {
      const def = w.exercises.find(e=>e.id===se.id); if(!def) return;
      se.sets.forEach(st => {
        if(st.weight>0&&st.reps>0) def.muscles.forEach(m=>{muscleVol[m]=(muscleVol[m]||0)+st.weight*st.reps;});

  const maxMV = Math.max(...Object.values(muscleVol), 1);

    const w = WORKOUTS[wk];
    w.exercises.forEach(ex => {
      if(!allEx.find(e=>e.id===ex.id)) {

    <div class="stat-card kpi" style="--kpi:#1565C0"><div class="stat-value" style="color:#1565C0">${totalVol >= 1000 ? Math.round(totalVol/1000*10)/10+'k' : Math.round(totalVol)}</div><div class="stat-label">Volume kg</div></div>
    <div class="stat-card kpi" style="--kpi:#e67e22"><div class="stat-value" style="color:#e67e22">${totalSets}</div><div class="stat-label">Séries Total</div></div>
    ${avgDuration > 0
      ? `<div class="stat-card kpi" style="--kpi:#8e44ad"><div class="stat-value" style="color:#8e44ad">${formatTimer(avgDuration)}</div><div class="stat-label">Tempo médio</div></div>`
      : `<div class="stat-card kpi" style="--kpi:#8e44ad"><div class="stat-value" style="color:#8e44ad">${avgVol}</div><div class="stat-label">kg / Sessão</div></div>`}
  </div>`;

  // Streak
  if (streak > 0) {
    html += `<div class="stat-card" style="margin-bottom:24px">
      <div class="stat-value" style="color:var(--accent)">${streak}</div>
      <div class="stat-label">Semana${streak>1?'s':''} consecutiva${streak>1?'s':''} a treinar</div>
    </div>`;
  }

  // Week comparison
  const cmp = calcWeekComparison(sessions);
  if (cmp.thisCount > 0 || cmp.lastCount > 0) {
    const volDiff = cmp.thisVol - cmp.lastVol;
    const volPct = cmp.lastVol > 0 ? Math.round((volDiff/cmp.lastVol)*100) : null;
    const volUp = volDiff >= 0;
    const fmtV = (v)=> v>=1000 ? Math.round(v/1000*10)/10+'k' : Math.round(v);
    html += `<p class="section-title">Esta Semana vs Anterior</p>
    <div class="cmp-grid">
      <div class="cmp-card">
        <div class="cmp-label">Volume</div>
        <div class="cmp-value">${fmtV(cmp.thisVol)}<span class="cmp-unit">kg</span></div>
        <div class="cmp-delta ${volUp?'up':'down'}">${volUp?'▲':'▼'} ${volPct!==null?Math.abs(volPct)+'%':fmtV(Math.abs(volDiff))+'kg'}</div>
        <div class="cmp-prev">anterior: ${fmtV(cmp.lastVol)}kg</div>
      </div>
      <div class="cmp-card">
        <div class="cmp-label">Treinos</div>
        <div class="cmp-value">${cmp.thisCount}</div>
        <div class="cmp-delta ${cmp.thisCount>=cmp.lastCount?'up':'down'}">${cmp.thisCount>=cmp.lastCount?'▲':'▼'} ${Math.abs(cmp.thisCount-cmp.lastCount)}</div>
        <div class="cmp-prev">anterior: ${cmp.lastCount}</div>
      </div>
    </div>`;
  }

  // Weekly volume chart (last 8 weeks) — only with 2+ weeks
  const weekly = calcWeeklyVolume(sessions);
  if (weekly.length >= 2) {
    const maxWV = Math.max(...weekly.map(w=>w.vol), 1);
    html += `<p class="section-title">Volume Semanal (kg)</p><div class="chart-wrap"><div class="chart-bars">`;
    const weeklyShown = weekly.slice(-8);
    weeklyShown.forEach((wk,i) => {
      const h = Math.max(6, Math.round((wk.vol/maxWV)*110));
      const vLabel = wk.vol >= 1000 ? `${Math.round(wk.vol/1000*10)/10}k` : `${Math.round(wk.vol)}`;
      const isCurrent = i === weeklyShown.length-1;
      html += `<div class="chart-bar-wrap">
        <div class="chart-bar-val">${vLabel}</div>
        <div class="chart-bar neutral${isCurrent?' current':''}" style="height:${h}px"></div>
        <div class="chart-bar-label">${wk.label}</div>

    html += `</div></div>`;

    const maxFreq = Math.max(...weekly.map(w=>w.count), 1);

  }

  // Progression chart
  html += `<p class="section-title">Progressão de Carga</p>
  <select class="ex-select" id="ex-select" onchange="updateChart()">`;
  allEx.forEach(ex => { html += `<option value="${ex.id}">${ex.name}</option>`; });
  html += `</select><div class="chart-wrap" id="chart-wrap"></div>`;

  // Exercise trends
  const trends = calcExerciseTrends(sessions, allEx);
  if (trends.length) {

    trends.forEach((t,i) => {

      html += `<div class="trend-row" style="padding:12px 16px">
        <div style="display:flex;align-items:center;gap:10px;flex:1">

          <span class="trend-name">${t.name}</span>
        </div>
        <div style="text-align:right">
          <div class="trend-val ${t.status}">${t.label}</div>
          <div class="trend-change">${t.current}kg atual</div>

  }

  // Top progressions

  }

  // Personal Records (PRs)

  Object.entries(MUSCLES).forEach(([key,label]) => {

  container.innerHTML = html;

function updateChart() {
  const exId = document.getElementById('ex-select')?.value; if(!exId) return;
  const points = [];
  getSessions().forEach(s => {
    const w = WORKOUTS[s.workoutKey]; if(!w) return;
    const se = s.exercises.find(e=>e.id===exId); if(!se) return;
    const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return;
    const maxW = Math.max(...valid.map(st=>st.weight));
    points.push({date:formatDateShort(s.date), weight:maxW});
  });

  const wrap = document.getElementById('chart-wrap'); if(!wrap) return;
  if (!points.length) { wrap.innerHTML=`<div class="no-data">Ainda não há dados para este exercício.</div>`; return; }

  const maxW = Math.max(...points.map(p=>p.weight));
  const recent = points.slice(-10);

  let html = `<div class="chart-bars">`;
  recent.forEach((p,i) => {
    const h = Math.max(4, Math.round((p.weight/maxW)*90));
    const prev = i>0?recent[i-1].weight:p.weight;
    const cls = p.weight>prev?'up':p.weight<prev?'keep':'neutral';
    html += `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${p.weight}</div>
      <div class="chart-bar ${cls}" style="height:${h}px"></div>
      <div class="chart-bar-label">${p.date}</div>
    </div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function calcWeeklyVolume(sessions) {
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    // ISO week key (year-week)
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    const weekNum = Math.floor((d - startOfYear) / (7*24*60*60*1000));
    const key = `${d.getFullYear()}-${weekNum}`;
    if (!weeks[key]) weeks[key] = { vol: 0, count: 0, date: d };
    weeks[key].vol += calcVolume(s);
    weeks[key].count += 1;
  });
  return Object.values(weeks)
    .sort((a,b)=>a.date-b.date)
    .map(w => ({ vol: w.vol, count: w.count, label: `${w.date.getDate()}/${w.date.getMonth()+1}` }));
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const weeks = new Set(sessions.map(s => {
    const d = new Date(s.date);
    const startOfYear = new Date(d.getFullYear(), 0, 1);
    return Math.floor((d - startOfYear) / (7*24*60*60*1000));
  }));
  const weeksArr = [...weeks].sort((a,b)=>b-a);
  let streak = 0;
  const currentWeek = weeksArr[0];
  for (let i=0; i<weeksArr.length; i++) {
    if (weeksArr[i] === currentWeek - i) streak++;
    else break;
  }
  return streak;
}

function calcPRs(sessions, allEx) {
  const prs = [];
  allEx.forEach(ex => {
    let best = null;
    sessions.forEach(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return;
      se.sets.forEach(st => {
        if (st.weight > 0 && st.reps > 0) {
          if (!best || st.weight > best.weight || (st.weight === best.weight && st.reps > best.reps)) {
            best = { weight: st.weight, reps: st.reps };
          }
        }
      });
    });
    if (best) prs.push({ name: ex.name, weight: best.weight, reps: best.reps });
  });
  return prs.sort((a,b)=>b.weight-a.weight);
}

function calcTopProgressions(sessions, allEx) {
  const progressions = [];
  allEx.forEach(ex => {
    const exSessions = sessions.filter(s => {
      const w = WORKOUTS[s.workoutKey]; if(!w) return false;
      return s.exercises.some(e=>e.id===ex.id);
    });
    if (exSessions.length < 2) return;
    const weights = exSessions.map(s => {
      const se = s.exercises.find(e=>e.id===ex.id); if(!se) return 0;
      const valid = se.sets.filter(st=>st.weight>0); if(!valid.length) return 0;
      return Math.max(...valid.map(st=>st.weight));
    }).filter(w=>w>0);
    if (weights.length < 2) return;
    const gain = weights[weights.length-1] - weights[0];
    if (gain > 0) progressions.push({name:ex.name, gain, from:weights[0], to:weights[weights.length-1]});
  });
  return progressions.sort((a,b)=>b.gain-a.gain);
}

    <p class="section-title">Dados Guardados</p>
    <div class="dados-stats">
      <div class="dados-stat"><div class="dados-stat-val">${sessions.length}</div><div class="dados-stat-lbl">Sessões</div></div>
      <div class="dados-stat"><div class="dados-stat-val">${Math.round(totalVol/1000*10)/10}k</div><div class="dados-stat-lbl">Volume kg</div></div>
    </div>
    <div class="dados-tip">
      <strong>💡 Como manter os dados seguros</strong>
      Faz backup 1× por semana após o treino de sexta. Guarda nos Ficheiros → iCloud Drive para sincronização automática.
    </div>
    <div class="dados-card">
      <div class="dados-title">Exportar Backup</div>
      <div class="dados-desc">Guarda um ficheiro com todos os teus treinos no iCloud Drive.</div>
      <button class="dados-btn export" onclick="exportData()">📥 Guardar Backup</button>
      ${sessions.length?`<div style="font-size:11px;color:var(--text3);margin-top:10px;text-align:center;font-family:var(--mono)">Última sessão: ${lastDate}</div>`:''}
    </div>
    <div class="dados-card">
      <div class="dados-title">Importar Backup</div>
      <div class="dados-desc">Restaurar dados a partir de um ficheiro de backup.</div>
      <input type="file" id="import-file" accept=".json" onchange="importData(event)">
      <button class="dados-btn import" onclick="document.getElementById('import-file').click()">📤 Escolher Ficheiro</button>
    </div>
    <div class="dados-card">
      <div class="dados-title" style="color:var(--red)">Apagar Tudo</div>
      <div class="dados-desc">Apaga todos os dados. Faz backup primeiro!</div>
      <button class="dados-btn danger" onclick="clearAllData()">🗑️ Apagar Todos os Dados</button>
    </div>`;
}

function exportData() {
  const sessions = getSessions();
  if (!sessions.length) { showToast('Sem dados para exportar'); return; }
  const data = {version:1, exportDate:new Date().toISOString(), sessionCount:sessions.length, sessions};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const fname = `treino_backup_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const a = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado ✓');
}

function importData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions||!Array.isArray(data.sessions)) throw new Error('Formato inválido');
      const current = getSessions();
      const choice = current.length > 0 ?
        confirm(`Tens ${current.length} sessões. Substituir pelos dados do backup (${data.sessions.length} sessões)?\n\nOK = Substituir\nCancelar = Combinar`) : true;
      if (choice) {
        saveSessions(data.sessions);
        showToast(`${data.sessions.length} sessões importadas ✓`);
      } else {
        const existingIds = new Set(current.map(s=>s.id));
        const newOnes = data.sessions.filter(s=>!existingIds.has(s.id));
        const combined = [...current,...newOnes].sort((a,b)=>new Date(a.date)-new Date(b.date));
        saveSessions(combined);
        showToast(`${newOnes.length} novas sessões combinadas ✓`);
      }
      setTimeout(()=>renderDados(), 500);
    } catch(err) { alert('Ficheiro inválido.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function clearAllData() {
  if (!confirm('Tens a certeza? Esta ação não pode ser desfeita.\nFizeste backup?')) return;
  if (!confirm('Última confirmação — apagar mesmo tudo?')) return;
  const sessions = getSessions();
  for (const s of sessions) { await sb.deleteSession(s.id); }
  _sessions = [];
  showToast('Todos os dados apagados');
  setTimeout(()=>renderDados(), 500);
}

// ======================== UTILS ========================
function calcVolume(s){let v=0;s.exercises.forEach(ex=>ex.sets.forEach(st=>{if(st.weight>0&&st.reps>0)v+=st.weight*st.reps;}));return Math.round(v);}
function formatDate(iso){return new Date(iso).toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function formatDateShort(iso){const d=new Date(iso);return`${d.getDate()}/${d.getMonth()+1}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('view-home').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">⏳</div><div style="font-family:var(--mono);font-size:13px">A carregar...</div></div>';
  await loadSessions();
  renderHome();
});
</script>
